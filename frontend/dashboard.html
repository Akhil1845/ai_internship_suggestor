<!DOCTYPE html>
<html>
<head>
    <title>AI Internship Platform</title>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary-orange: #ff8c05;
            --primary-yellow: #ffbb33;
            --text-dark: #1e293b;
            --text-gray: #64748b;
            --bg-blue: #f0f9ff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-blue);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* ================= NAVBAR ================= */

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 50px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .project-title {
            font-size: 20px;
            font-weight: bold;
        }

        .project-title .gold-text {
            color: var(--primary-orange);
        }

        .nav-right button {
            margin-left: 10px;
            background: linear-gradient(90deg, var(--primary-orange), var(--primary-yellow));
            border: none;
            padding: 10px 18px;
            color: white;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-right button:hover {
            transform: scale(1.05);
        }

        /* ================= HERO ================= */

        .hero {
            padding: 80px 60px 40px 60px;
        }

        .welcome-text {
            font-size: 52px;
            font-weight: 800;
            display: inline-block;
        }

        .flip-letter {
            display: inline-block;
            transform-style: preserve-3d;
        }

        .username-animated {
            font-weight: 800;
            color: var(--primary-orange);
            margin-left: 6px;
            display: inline-block;
        }

        .hero-sub {
            margin-top: 15px;
            font-size: 18px;
            color: var(--text-gray);
        }

        /* ================= CARDS ================= */

        .container {
            padding: 20px 60px 60px 60px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            transition: 0.3s;
            opacity: 0;
            transform: translateY(60px);
        }

        .card:hover {
            transform: translateY(-6px);
        }

        .card h3 {
            margin-top: 0;
            transition: 0.3s;
        }

        .card h3:hover {
            text-shadow: 0 0 10px rgba(255,140,5,0.6),
                         0 0 20px rgba(255,187,51,0.5);
        }

        /* ================= PREMIUM FILE INPUT ================= */

        input[type="file"] {
            display: none;
        }

        .custom-file {
            border: 2px dashed var(--primary-yellow);
            padding: 18px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .custom-file:hover {
            background: #fff8ef;
            transform: scale(1.02);
        }

        .custom-file:active {
            transform: scale(0.95);
        }

        .custom-file span {
            color: var(--text-gray);
            font-size: 14px;
        }

        .card button {
            background: linear-gradient(90deg, var(--primary-orange), var(--primary-yellow));
            border: none;
            padding: 12px;
            color: white;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        .card button:hover {
            transform: scale(1.03);
        }

        /* ================= SOCIAL PROFILES ================= */

        .social-profiles-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .social-profile-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #f0f9ff;
            border-radius: 10px;
            transition: 0.3s;
        }

        .social-profile-item:hover {
            background: #e0f2ff;
        }

        .social-profile-item a {
            color: var(--primary-orange);
            text-decoration: none;
            font-weight: 600;
            flex: 1;
            word-break: break-all;
        }

        .social-profile-item a:hover {
            text-decoration: underline;
        }

        .social-profile-item .delete-btn {
            background: #ff6b6b;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .social-profile-item .delete-btn:hover {
            background: #ff5252;
        }

        .social-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .social-form input {
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }

        .social-form select {
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }

        .social-form .form-row {
            display: flex;
            gap: 10px;
        }

        .social-form .form-row input {
            flex: 1;
        }

        .social-form button {
            padding: 10px;
            background: linear-gradient(90deg, var(--primary-orange), var(--primary-yellow));
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
        }

        .social-form button:hover {
            transform: scale(1.02);
        }

        .add-social-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, var(--primary-orange), var(--primary-yellow));
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
        }

        .add-social-btn:hover {
            transform: scale(1.03);
        }

        /* ================= SOCIAL PROFILES SECTION ================= */

        .social-section {
            padding: 40px 60px;
            background: white;
            margin: 40px 60px 0;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            opacity: 0;
            transform: translateY(60px);
        }

        .social-section h2 {
            margin: 0 0 30px;
            font-size: 24px;
            color: var(--text-dark);
        }

        .platform-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }

        .platform-btn {
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            background: white;
            color: var(--text-dark);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .platform-btn:hover {
            border-color: var(--primary-orange);
            color: var(--primary-orange);
            transform: scale(1.05);
        }

        .platform-btn.active {
            background: linear-gradient(90deg, var(--primary-orange), var(--primary-yellow));
            color: white;
            border-color: var(--primary-orange);
        }

        .social-input-wrapper {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .social-input-wrapper input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
        }

        .social-input-wrapper button {
            padding: 12px 24px;
            background: linear-gradient(90deg, var(--primary-orange), var(--primary-yellow));
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
        }

        .social-input-wrapper button:hover {
            transform: scale(1.02);
        }

        .added-profiles {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 12px;
            margin-top: 30px;
        }

        .profile-card {
            width: 100%;
            padding: 16px 18px;
            background: #f0f9ff;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
            transition: all 0.3s;
            text-align: left;
            border: 2px solid transparent;
            box-sizing: border-box;
        }

        .profile-card:hover {
            background: #e0f2ff;
            border-color: var(--primary-orange);
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .profile-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .profile-link {
            width: 100%;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
        }

        .profile-status {
            color: var(--text-gray);
            font-size: 13px;
            font-weight: 600;
        }

        .view-analytics-btn {
            margin-top: 6px;
            background: linear-gradient(90deg, var(--primary-orange), var(--primary-yellow));
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .view-analytics-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(255, 140, 5, 0.25);
        }

        @media (max-width: 1100px) {
            .added-profiles {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 760px) {
            .added-profiles {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        .remove-profile {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .remove-profile:hover {
            background: #ff5252;
        }

        .no-profiles-msg {
            text-align: center;
            color: var(--text-gray);
            padding: 30px;
            font-size: 14px;
        }

        .analytics-modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.55);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 20px;
            box-sizing: border-box;
        }

        .analytics-content {
            background: white;
            padding: 28px;
            border-radius: 20px;
            width: min(760px, 100%);
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 30px 60px rgba(15, 23, 42, 0.25);
        }

        .analytics-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .analytics-header h3 {
            margin: 0;
            font-size: 24px;
            color: var(--text-dark);
        }

        .close-btn {
            font-size: 28px;
            line-height: 1;
            border: none;
            background: transparent;
            color: #334155;
            cursor: pointer;
        }

        .analytics-stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            margin: 8px 0 12px;
        }

        .analytics-info {
            margin-bottom: 14px;
            font-size: 13px;
            color: var(--text-gray);
            font-weight: 600;
        }

        .analytics-stat {
            background: #f8fbff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px 12px;
        }

        .analytics-stat-label {
            font-size: 12px;
            color: var(--text-gray);
            font-weight: 600;
        }

        .analytics-stat-value {
            margin-top: 3px;
            font-size: 18px;
            font-weight: 800;
            color: var(--text-dark);
        }

        .chart-card {
            background: #fbfdff;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 14px;
        }

        .chart-card + .chart-card {
            margin-top: 16px;
        }

        .chart-card canvas {
            width: 100% !important;
            height: 250px !important;
        }

        @media (max-width: 760px) {
            .analytics-stats {
                grid-template-columns: 1fr;
            }
        }

    </style>
</head>

<script>

if (!userEmail) window.location.href = "user_login.html";

<div class="navbar">

</div>

<!-- HERO SECTION -->

<!-- CARDS -->
<div class="container">

<!-- SOCIAL PROFILES SECTION -->
<div class="social-section" id="socialSection">
    <h2>Social Profile</h2>
    
    <div id="profilesContainer">
        <div class="no-profiles-msg">No profiles added yet. Go to Profile page to add one!</div>
    </div>
</div>

<div id="analyticsModal" class="analytics-modal">
    <div class="analytics-content">
        <div class="analytics-header">
            <h3 id="analyticsTitle">Platform Analytics</h3>
            <button class="close-btn" onclick="closeAnalytics()" aria-label="Close analytics">×</button>

        <div class="analytics-stats">
            <div class="analytics-stat">
                <div class="analytics-stat-label">Problems Attempted</div>
                <div class="analytics-stat-value" id="statProblems">0</div>
            </div>
            <div class="analytics-stat">
                <div class="analytics-stat-label">Contest Stats</div>
                <div class="analytics-stat-value" id="statContests">0</div>
            </div>
            <div class="analytics-stat">
                <div class="analytics-stat-label">Activity Streak</div>
                <div class="analytics-stat-value" id="statStreak">0 days</div>

        </div>

        <div id="analyticsInfo" class="analytics-info">Fetching real analytics...</div>

        <div class="chart-card">
            <canvas id="barChart"></canvas>
        </div>
        <div class="chart-card">
            <canvas id="lineChart"></canvas>
        </div>
    </div>
</div>

<script>

/* NAVIGATION */

function logout() {
    localStorage.removeItem("userEmail");
    window.location.href = "user_login.html";
}

function goProfile() {
    window.location.href = "profile.html";
}

/* FILE TEXT UPDATE */

function updateResumeText() {
    const file = document.getElementById("resumeFile").files[0];
    document.getElementById("resumeText").innerText =
        file ? file.name : "Choose Resume";
}

function updateCertificateText() {
    const file = document.getElementById("certificateFile").files[0];
    document.getElementById("certificateText").innerText =
        file ? file.name : "Choose Certificate";
}

/* WELCOME ANIMATION */

function animateWelcome(name) {

    const container = document.getElementById("welcomeContainer");
    container.innerHTML = "";

    const text = "Welcome ";

    text.split("").forEach(letter => {
        const span = document.createElement("span");
        span.innerText = letter;
        span.style.display = "inline-block";
        span.style.opacity = "0";
        span.style.transform = "translateY(40px)";

        if (letter.toLowerCase() === "c" || letter.toLowerCase() === "m") {
            span.classList.add("flip-letter");
        }

        container.appendChild(span);
    });

    const nameSpan = document.createElement("span");
    nameSpan.innerText = name + " 👋";
    nameSpan.classList.add("username-animated");
    nameSpan.style.opacity = "0";
    nameSpan.style.transform = "translateY(40px)";
    container.appendChild(nameSpan);

    // Welcome message timeline - FAST and SMOOTH
    const welcomeTl = gsap.timeline();

    welcomeTl.to("#welcomeContainer span:not(.username-animated)", {
        opacity: 1,
        y: 0,
        duration: 0.4,
        stagger: 0.02,
        ease: "power2.out"
    });

    welcomeTl.fromTo(".flip-letter",
        { rotationY: 180 },
        { rotationY: 0, duration: 0.5, ease: "back.out(1.7)" },
        0
    );

    welcomeTl.to(".username-animated", {
        opacity: 1,
        y: -8,
        duration: 0.4,
        ease: "power2.out"
    });

    welcomeTl.to(".username-animated", {
        y: 0,
        duration: 0.3,
        ease: "elastic.out(1, 0.5)"
    });

    // Cards spawn AFTER welcome animation completes
    welcomeTl.add(() => {
        animateCards();
    });
}

function animateCards() {
    gsap.to(".card", {
        opacity: 1,
        y: 0,
        duration: 0.8,
        stagger: 0.2,
        ease: "power3.out"
    });

    // Animate social section after cards
    gsap.to("#socialSection", {
        opacity: 1,
        y: 0,
        duration: 0.6,
        ease: "power2.out",
        delay: 0.6
    });
}

/* LOAD USER FROM MYSQL */

// Store social profiles in memory
let socialProfiles = [];
let barChartInstance;
let lineChartInstance;

function selectPlatform(platform, key) {

}

function addSocialProfileNew() {
    // Removed - users add profiles from Profile page instead
}

function removeSocialProfile(platform) {
    // Removed - users remove profiles from Profile page instead
}

function resetAnalyticsCharts() {
    if (barChartInstance) {
        barChartInstance.destroy();
        barChartInstance = null;
    }

    if (lineChartInstance) {
        lineChartInstance.destroy();
        lineChartInstance = null;
    }
}

async function openAnalytics(platformKey, platformName) {
    const modal = document.getElementById("analyticsModal");
    const info = document.getElementById("analyticsInfo");

    modal.style.display = "flex";
    document.getElementById("analyticsTitle").innerText = `${platformName} Analytics`;
    document.getElementById("statProblems").innerText = "--";
    document.getElementById("statContests").innerText = "--";
    document.getElementById("statStreak").innerText = "--";
    info.innerText = "Fetching real analytics...";

    resetAnalyticsCharts();

    try {
        const response = await fetch(
            `http://localhost:8089/api/students/social/analytics?email=${encodeURIComponent(userEmail)}&platform=${encodeURIComponent(platformKey)}`
        );

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        const barLabels = Array.isArray(data.barLabels) ? data.barLabels : [];
        const barData = Array.isArray(data.barData) ? data.barData : [];
        const lineLabels = Array.isArray(data.lineLabels) ? data.lineLabels : [];
        const lineData = Array.isArray(data.lineData) ? data.lineData : [];

        document.getElementById("statProblems").innerText = Number.isFinite(data.problemsAttempted) ? data.problemsAttempted : 0;
        document.getElementById("statContests").innerText = Number.isFinite(data.contestStats) ? data.contestStats : 0;
        const streakValue = Number.isFinite(data.activityStreak) ? data.activityStreak : 0;
        document.getElementById("statStreak").innerText = `${streakValue} days`;

        const sourceText = data.source ? `Source: ${data.source}` : "Source: API";
        const messageText = data.message ? ` | ${data.message}` : "";
        info.innerText = `${sourceText}${messageText}`;

        if (barLabels.length > 0 && barData.length > 0) {
            barChartInstance = new Chart(document.getElementById("barChart"), {
                type: "bar",
                data: {
                    labels: barLabels,
                    datasets: [{
                        label: `${platformName} Metrics`,
                        data: barData,
                        backgroundColor: ["#fbbf24", "#fb923c", "#f97316", "#fdba74", "#fb7185"],
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: true }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { precision: 0 }
                        }
                    }
                }
            });
        }

        if (lineLabels.length > 0 && lineData.length > 0) {
            lineChartInstance = new Chart(document.getElementById("lineChart"), {
                type: "line",
                data: {
                    labels: lineLabels,
                    datasets: [{
                        label: `${platformName} Growth`,
                        data: lineData,
                        fill: false,
                        tension: 0.35,
                        borderColor: "#ff8c05",
                        backgroundColor: "#ff8c05",
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: true }
                    }
                }
            });
        }

        if (barLabels.length === 0 && lineLabels.length === 0) {
            info.innerText = "No real analytics data available for this platform/profile yet.";
        }
    } catch (error) {
        console.error("Error fetching analytics:", error);
        info.innerText = "Failed to fetch real analytics. Check backend server/API availability and profile link validity.";
        document.getElementById("statProblems").innerText = "0";
        document.getElementById("statContests").innerText = "0";
        document.getElementById("statStreak").innerText = "0 days";
        resetAnalyticsCharts();
    }
}

function closeAnalytics() {
    document.getElementById("analyticsModal").style.display = "none";
}

function displayAddedProfiles() {
    const container = document.getElementById('profilesContainer');

    const normalizeSocialUrl = (platformKey, rawValue) => {
        const value = (rawValue || '').trim();
        if (!value) return '';

        if (/^https?:\/\//i.test(value)) {
            return value;
        }

        const clean = value.replace(/^@/, '').replace(/^\/+|\/+$/g, '');

        if (/\./.test(clean)) {
            return `https://${clean}`;
        }

        if (platformKey === 'linkedin') return `https://www.linkedin.com/in/${clean}`;
        if (platformKey === 'github') return `https://github.com/${clean}`;
        if (platformKey === 'leetcode') return `https://leetcode.com/${clean}`;
        if (platformKey === 'codechef') return `https://www.codechef.com/users/${clean}`;
        if (platformKey === 'hackerrank') return `https://www.hackerrank.com/${clean}`;

        return `https://${clean}`;
    };
    
    // Create profile map for quick lookup
    const profileMap = {};
    socialProfiles.forEach(profile => {
        profileMap[profile.platform.toLowerCase()] = profile.url;
    });

    // Define all 5 platforms
    const platforms = [
        { name: 'LinkedIn', key: 'linkedin' },
        { name: 'GitHub', key: 'github' },
        { name: 'LeetCode', key: 'leetcode' },
        { name: 'CodeChef', key: 'codechef' },
        { name: 'HackerRank', key: 'hackerrank' }
    ];

    let html = '<div class="added-profiles">';
    platforms.forEach(platform => {
        const url = normalizeSocialUrl(platform.key, profileMap[platform.key] || '');
        const status = url ? 'Profile connected' : 'Not added yet';
        
        html += `
            <div class="profile-card">
                <div class="profile-title">${platform.name}</div>
                <div class="profile-link">
                    <span class="profile-status">${status}</span>
                </div>
                <button class="view-analytics-btn" onclick="openAnalytics('${platform.key}', '${platform.name}')">View Analytics</button>
            </div>
        `;
    });
    html += '</div>';
    
    container.innerHTML = html;
}

async function loadSocialProfiles() {
    try {
        const response = await fetch(`http://localhost:8089/api/students/social?email=${userEmail}`);
        const data = await response.json();
        
        if (data && Array.isArray(data)) {
            socialProfiles = data;
            displayAddedProfiles();
        }
    } catch (error) {
        console.error("Error loading social profiles:", error);
    }
}

async function loadUser() {
    try {
        const response = await fetch(
            `http://localhost:8089/api/students/profile?email=${userEmail}`
        );

        const data = await response.json();

        if (data && data.name) {
            animateWelcome(data.name);
        } else {
            animateWelcome("User");
        }

    } catch (error) {
        animateWelcome("User");
    }

    // Load social profiles after user loads
    loadSocialProfiles();
}

loadUser();

document.getElementById("analyticsModal").addEventListener("click", function (event) {
    if (event.target.id === "analyticsModal") {
        closeAnalytics();
    }
});

document.addEventListener("keydown", function (event) {
    if (event.key === "Escape") {
        closeAnalytics();
    }
});

</script>
