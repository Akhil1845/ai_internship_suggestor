<!DOCTYPE html>
<html>
<head>
    <title>My Profile - AI Internship Platform</title>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <style>
        :root {
            --primary-orange: #ff8c05;
            --primary-yellow: #ffbb33;
            --text-dark: #1e293b;
            --text-gray: #64748b;
            --bg-blue: #f0f9ff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #ffffff, #f0f9ff);
            color: var(--text-dark);
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 60px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .project-title {
            font-size: 20px;
            font-weight: bold;
        }

        .project-title .gold-text {
            color: var(--primary-orange);
        }

        .navbar button {
            background: linear-gradient(90deg, var(--primary-orange), var(--primary-yellow));
            border: none;
            padding: 10px 18px;
            color: white;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
        }

        /* PROFILE CARD */
        .profile-container {
            max-width: 900px;
            margin: 100px auto;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            opacity: 0;
            visibility: hidden;
        }

        h2 {
            margin-bottom: 30px;
            font-size: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            font-size: 14px;
        }

        .save-btn {
            margin-top: 20px;
            padding: 14px;
            width: 100%;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, var(--primary-orange), var(--primary-yellow));
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        .status-message {
            margin-top: 15px;
            font-size: 14px;
            color: green;
        }

        /* SOCIAL PROFILES SECTION */
        .social-section {
            max-width: 920px;
            margin: 30px auto 100px;
            background: #ffffff;
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            opacity: 0;
            visibility: hidden;
            transform: translateY(30px);
        }

        .social-section h3 {
            margin: 0 0 18px 0;
            font-size: 22px;
            color: var(--text-dark);
        }

        .added-profiles {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .profile-card {
            padding: 14px 20px;
            background: #f0f9ff;
            border-radius: 12px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            column-gap: 12px;
            align-items: end;
            transition: all 0.3s;
            opacity: 1;
            transform: translateY(0);
            width: 100%;
        }

        .profile-card:hover {
            background: #e0f2ff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }

        .profile-link {
            display: flex;
            flex-direction: column;
            gap: 3px;
            min-width: 0;
        }

        .profile-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            align-self: end;
        }

        .delete-btn {
            padding: 8px 16px;
            background: #ff4757;
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 80px;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(255, 71, 87, 0.2);
        }

        .delete-btn:hover {
            background: #ff3838;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 71, 87, 0.4);
        }

        .delete-btn:active {
            transform: translateY(0);
        }

        .add-btn {
            padding: 10px 18px;
            background: #2ecc71;
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(46, 204, 113, 0.2);
        }

        .add-btn:hover {
            background: #27ae60;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.4);
        }

        .add-btn:active {
            transform: translateY(0);
        }

        .profile-label {
            font-size: 13px;
            color: var(--text-gray);
            font-weight: 600;
        }

        .profile-link a {
            color: var(--primary-orange);
            font-weight: 600;
            text-decoration: none;
            word-break: break-all;
            font-size: 14px;
        }

        .profile-link a:hover {
            text-decoration: underline;
        }

        .profile-empty {
            color: var(--text-gray);
            font-size: 13px;
            font-weight: 600;
        }

        .profile-value {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-dark);
            background: #ffffff;
            box-sizing: border-box;
        }

        @media (max-width: 768px) {
            .profile-card {
                grid-template-columns: 1fr;
            }

            .profile-actions {
                justify-content: flex-end;
            }
        }

    </style>
</head>
<body>

<script>
const userEmail = localStorage.getItem("userEmail");
if (!userEmail) window.location.href = "user_login.html";
</script>

<div class="navbar">
    <div class="project-title"><span class="gold-text">AI</span> Internship Platform</div>
    <button onclick="goDashboard()">Back to Dashboard</button>
</div>

<div class="profile-container" id="profileCard">
    <h2>My Profile</h2>

    <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name">
    </div>

    <div class="form-group">
        <label>Primary Email</label>
        <input type="email" id="email" disabled>
    </div>

    <div class="form-group">
        <label>Qualification</label>
        <input type="text" id="qualification">
    </div>

    <div class="form-group">
        <label>Secondary Email</label>
        <input type="email" id="secondaryEmail">
    </div>

    <div class="form-group">
        <label>Contact Number</label>
        <input type="text" id="contactNumber">
    </div>

    <div class="form-group">
        <label>Skills</label>
        <input type="text" id="skills">
    </div>

    <div class="form-group">
        <label>Preferred Domain</label>
        <input type="text" id="preferredDomain">
    </div>

    <div class="form-group">
        <label>Class / Degree</label>
        <input type="text" id="studentClass">
    </div>

    <div class="form-group">
        <label>College</label>
        <input type="text" id="college">
    </div>

    <button class="save-btn" onclick="saveProfile()">Save Profile</button>

    <div id="status" class="status-message"></div>
</div>

<div class="social-section" id="socialSection">
    <h3>Social Profiles</h3>
    <div id="profilesContainer" class="added-profiles">
        <div class="profile-card">
            <div class="profile-link">
                <span class="profile-label">LinkedIn</span>
                <input id="social-linkedin" class="profile-value" type="text" placeholder="Paste LinkedIn URL here">
            </div>
            <div class="profile-actions">
                <button class="add-btn" onclick="saveSocialProfile('linkedin')">Add</button>
                <button class="delete-btn" onclick="deleteSocialProfile('linkedin')">Delete</button>
            </div>
        </div>
        <div class="profile-card">
            <div class="profile-link">
                <span class="profile-label">GitHub</span>
                <input id="social-github" class="profile-value" type="text" placeholder="Paste GitHub URL here">
            </div>
            <div class="profile-actions">
                <button class="add-btn" onclick="saveSocialProfile('github')">Add</button>
                <button class="delete-btn" onclick="deleteSocialProfile('github')">Delete</button>
            </div>
        </div>
        <div class="profile-card">
            <div class="profile-link">
                <span class="profile-label">LeetCode</span>
                <input id="social-leetcode" class="profile-value" type="text" placeholder="Paste LeetCode URL here">
            </div>
            <div class="profile-actions">
                <button class="add-btn" onclick="saveSocialProfile('leetcode')">Add</button>
                <button class="delete-btn" onclick="deleteSocialProfile('leetcode')">Delete</button>
            </div>
        </div>
        <div class="profile-card">
            <div class="profile-link">
                <span class="profile-label">CodeChef</span>
                <input id="social-codechef" class="profile-value" type="text" placeholder="Paste CodeChef URL here">
            </div>
            <div class="profile-actions">
                <button class="add-btn" onclick="saveSocialProfile('codechef')">Add</button>
                <button class="delete-btn" onclick="deleteSocialProfile('codechef')">Delete</button>
            </div>
        </div>
        <div class="profile-card">
            <div class="profile-link">
                <span class="profile-label">HackerRank</span>
                <input id="social-hackerrank" class="profile-value" type="text" placeholder="Paste HackerRank URL here">
            </div>
            <div class="profile-actions">
                <button class="add-btn" onclick="saveSocialProfile('hackerrank')">Add</button>
                <button class="delete-btn" onclick="deleteSocialProfile('hackerrank')">Delete</button>
            </div>
        </div>
    </div>
</div>

<script>

/* ================= NAVIGATION ================= */

function goDashboard() {
    window.location.href = "dashboard.html";
}

/* ================= LOAD PROFILE FROM MYSQL ================= */

async function loadProfile() {
    try {
        const response = await fetch(
            `http://localhost:8089/api/students/profile?email=${userEmail}`
        );

        const data = await response.json();

        document.getElementById("name").value = data.name || "";
        document.getElementById("email").value = data.email || "";
        document.getElementById("qualification").value = data.qualification || "";
        document.getElementById("secondaryEmail").value = data.secondaryEmail || "";
        document.getElementById("contactNumber").value = data.contactNumber || "";
        document.getElementById("skills").value = data.skills || "";
        document.getElementById("preferredDomain").value = data.preferredDomain || "";
        document.getElementById("studentClass").value = data.studentClass || "";
        document.getElementById("college").value = data.college || "";
        
        return data;
    } catch (error) {
        console.error("Error loading profile:", error);
        return null;
    }
}

/* ================= SAVE PROFILE TO MYSQL ================= */

async function saveProfile() {

    const profileData = {
        name: document.getElementById("name").value,
        qualification: document.getElementById("qualification").value,
        secondaryEmail: document.getElementById("secondaryEmail").value,
        contactNumber: document.getElementById("contactNumber").value,
        skills: document.getElementById("skills").value,
        preferredDomain: document.getElementById("preferredDomain").value,
        studentClass: document.getElementById("studentClass").value,
        college: document.getElementById("college").value
    };

    const response = await fetch(
        `http://localhost:8089/api/students/profile?email=${userEmail}`,
        {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(profileData)
        }
    );

    const result = await response.text();

    document.getElementById("status").innerText = result;
}

/* ================= LOAD SOCIAL PROFILES ================= */

const socialPlatforms = [
    { platform: "LinkedIn", key: "linkedin", icon: "💼" },
    { platform: "GitHub", key: "github", icon: "🐙" },
    { platform: "LeetCode", key: "leetcode", icon: "📝" },
    { platform: "CodeChef", key: "codechef", icon: "👨‍💻" },
    { platform: "HackerRank", key: "hackerrank", icon: "🏆" }
];

function renderSocialProfiles(profiles) {
    const profileMap = {};
    (profiles || []).forEach((item) => {
        if (!item || !item.platform) return;
        profileMap[item.platform.toLowerCase()] = item.url || "";
    });

    document.getElementById("social-linkedin").value = profileMap.linkedin || "";
    document.getElementById("social-github").value = profileMap.github || "";
    document.getElementById("social-leetcode").value = profileMap.leetcode || "";
    document.getElementById("social-codechef").value = profileMap.codechef || "";
    document.getElementById("social-hackerrank").value = profileMap.hackerrank || "";
}

function normalizeSocialUrl(platformKey, rawValue) {
    const value = (rawValue || "").trim();
    if (!value) return "";

    if (/^https?:\/\//i.test(value)) {
        return value;
    }

    const clean = value.replace(/^@/, "").replace(/^\/+|\/+$/g, "");

    if (/\./.test(clean)) {
        return `https://${clean}`;
    }

    if (platformKey === "linkedin") return `https://www.linkedin.com/in/${clean}`;
    if (platformKey === "github") return `https://github.com/${clean}`;
    if (platformKey === "leetcode") return `https://leetcode.com/${clean}`;
    if (platformKey === "codechef") return `https://www.codechef.com/users/${clean}`;
    if (platformKey === "hackerrank") return `https://www.hackerrank.com/${clean}`;

    return `https://${clean}`;
}

function buildSocialProfilesPayload() {
    return [
        { platform: "LinkedIn", key: "linkedin", url: normalizeSocialUrl("linkedin", document.getElementById("social-linkedin").value) },
        { platform: "GitHub", key: "github", url: normalizeSocialUrl("github", document.getElementById("social-github").value) },
        { platform: "LeetCode", key: "leetcode", url: normalizeSocialUrl("leetcode", document.getElementById("social-leetcode").value) },
        { platform: "CodeChef", key: "codechef", url: normalizeSocialUrl("codechef", document.getElementById("social-codechef").value) },
        { platform: "HackerRank", key: "hackerrank", url: normalizeSocialUrl("hackerrank", document.getElementById("social-hackerrank").value) }
    ].filter(p => p.url.trim() !== "");
}

async function saveSocialProfile(platform) {
    const fieldId = `social-${platform}`;
    const value = document.getElementById(fieldId).value.trim();

    if (!value) {
        alert("Please enter a profile URL before adding");
        return;
    }

    document.getElementById(fieldId).value = normalizeSocialUrl(platform, value);

    try {
        const socialProfiles = buildSocialProfilesPayload();

        const response = await fetch(`http://localhost:8089/api/students/social?email=${userEmail}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ socialProfiles })
        });

        if (response.ok) {
            alert("Profile saved successfully!");
        } else {
            alert("Failed to save profile");
        }
    } catch (error) {
        console.error("Error saving social profile:", error);
        alert("Error saving profile");
    }
}

async function deleteSocialProfile(platform) {
    if (!confirm(`Delete ${platform.toUpperCase()} profile?`)) {
        return;
    }

    try {
        const fieldId = `social-${platform}`;
        document.getElementById(fieldId).value = "";

        const socialProfiles = buildSocialProfilesPayload();

        const response = await fetch(`http://localhost:8089/api/students/social?email=${userEmail}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ socialProfiles })
        });

        if (response.ok) {
            alert("Profile deleted successfully!");
        } else {
            alert("Failed to delete profile");
        }
    } catch (error) {
        console.error("Error deleting social profile:", error);
        alert("Error deleting profile");
    }
}

function openAddProfileModal(platformKey) {
    const selectedPlatform = socialPlatforms.find((item) => item.key === platformKey);
    if (!selectedPlatform) {
        alert("Invalid platform selected");
        return;
    }

    const modal = document.createElement('div');
    modal.id = 'addProfileModal';
    modal.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
    `;

    const content = document.createElement('div');
    content.style.cssText = `
        background: white;
        padding: 40px;
        border-radius: 15px;
        width: 90%;
        max-width: 500px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    `;

    const title = document.createElement('h2');
    title.textContent = `Add ${selectedPlatform.platform} Profile`;
    title.style.marginTop = '0';

    const urlGroup = document.createElement('div');
    urlGroup.style.marginBottom = '20px';

    const urlLabel = document.createElement('label');
    urlLabel.textContent = 'Profile URL:';
    urlLabel.style.display = 'block';
    urlLabel.style.fontWeight = '600';
    urlLabel.style.marginBottom = '8px';

    const urlInput = document.createElement('input');
    urlInput.id = 'addProfileURL';
    urlInput.type = 'url';
    urlInput.placeholder = 'https://...';
    urlInput.style.cssText = `
        width: 100%;
        padding: 12px;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        font-size: 14px;
        box-sizing: border-box;
    `;

    urlGroup.appendChild(urlLabel);
    urlGroup.appendChild(urlInput);

    const buttonGroup = document.createElement('div');
    buttonGroup.style.cssText = `
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 30px;
    `;

    const cancelBtn = document.createElement('button');
    cancelBtn.textContent = 'Cancel';
    cancelBtn.style.cssText = `
        padding: 10px 20px;
        background: #e2e8f0;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
        transition: all 0.2s;
    `;
    cancelBtn.onmouseover = () => cancelBtn.style.background = '#cbd5e0';
    cancelBtn.onmouseout = () => cancelBtn.style.background = '#e2e8f0';
    cancelBtn.onclick = () => modal.remove();

    const addBtn = document.createElement('button');
    addBtn.textContent = 'Add Profile';
    addBtn.style.cssText = `
        padding: 10px 20px;
        background: #2ecc71;
        border: none;
        color: white;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
        transition: all 0.2s;
    `;
    addBtn.onmouseover = () => addBtn.style.background = '#27ae60';
    addBtn.onmouseout = () => addBtn.style.background = '#2ecc71';
    addBtn.onclick = async () => {
        const url = urlInput.value.trim();

        if (!url) {
            alert('Please enter a URL');
            return;
        }

        const fieldId = `social-${selectedPlatform.key}`;
        document.getElementById(fieldId).value = url;

        const socialProfiles = [
            { platform: "LinkedIn", key: "linkedin", url: document.getElementById("social-linkedin").value },
            { platform: "GitHub", key: "github", url: document.getElementById("social-github").value },
            { platform: "LeetCode", key: "leetcode", url: document.getElementById("social-leetcode").value },
            { platform: "CodeChef", key: "codechef", url: document.getElementById("social-codechef").value },
            { platform: "HackerRank", key: "hackerrank", url: document.getElementById("social-hackerrank").value }
        ].filter(p => p.url.trim() !== "");

        try {
            const response = await fetch(`http://localhost:8089/api/students/social?email=${userEmail}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ socialProfiles })
            });

            if (response.ok) {
                alert("Profile added successfully!");
                modal.remove();
            } else {
                alert("Failed to add profile");
            }
        } catch (error) {
            console.error("Error adding social profile:", error);
            alert("Error adding profile");
        }
    };

    buttonGroup.appendChild(cancelBtn);
    buttonGroup.appendChild(addBtn);

    content.appendChild(title);
    content.appendChild(urlGroup);
    content.appendChild(buttonGroup);
    modal.appendChild(content);
    document.body.appendChild(modal);
}

async function loadSocialProfiles() {
    try {
        const response = await fetch(
            `http://localhost:8089/api/students/social?email=${userEmail}`
        );

        if (!response.ok) {
            renderSocialProfiles([]);
            return;
        }

        const data = await response.json();
        renderSocialProfiles(Array.isArray(data) ? data : []);
    } catch (error) {
        console.error("Error loading social profiles:", error);
        renderSocialProfiles([]);
    }
}

/* ================= GSAP ANIMATION ================= */

async function initAnimations() {
    // THE ENTRANCE TIMELINE - Inspired by GSAP.com
    const tl = gsap.timeline({
        defaults: { ease: "power4.out" }
    });

    // 1. Make cards visible
    gsap.set(["#profileCard", "#socialSection"], { autoAlpha: 1 });

    // 2. Main profile card entrance with 3D effect
    tl.from("#profileCard", {
        duration: 1.6,
        y: 120,
        scale: 0.85,
        rotationX: -15,
        opacity: 0,
        transformOrigin: "center bottom",
        ease: "expo.out"
    })
    
    // 3. Stagger in form groups
    .from(".form-group", {
        opacity: 0,
        y: 30,
        stagger: 0.08,
        duration: 0.8,
        ease: "power2.out"
    }, "-=1")
    
    // 4. Float in the save button
    .from(".save-btn", {
        opacity: 0,
        scale: 0.9,
        y: 20,
        duration: 0.6,
        ease: "back.out(1.5)"
    }, "-=0.4")

    .to("#socialSection", {
        opacity: 1,
        y: 0,
        duration: 0.7,
        ease: "power2.out"
    }, "-=0.2")

    .fromTo("#socialSection .profile-card", {
        opacity: 0,
        y: 18
    }, {
        opacity: 1,
        y: 0,
        stagger: 0.05,
        duration: 0.5,
        ease: "power2.out",
        clearProps: "opacity,transform"
    }, "-=0.45");

    // 5. Subtle floating animation on h2
    gsap.to("#profileCard h2", {
        y: -5,
        duration: 2,
        repeat: -1,
        yoyo: true,
        ease: "sine.inOut"
    });
}

// Load profile and then start animations
renderSocialProfiles([]);

Promise.all([loadProfile(), loadSocialProfiles()]).then(() => {
    initAnimations();
});

</script>

</body>
</html>
