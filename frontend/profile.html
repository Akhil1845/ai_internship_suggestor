<!DOCTYPE html>
<html data-theme="light">
<head>
    <title>My Profile - CareerPilot</title>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="stylesheet" href="profile.css">
</head>
<body>

<script>
const userEmail = localStorage.getItem("userEmail");
if (!userEmail) window.location.href = "user_login.html";
</script>

<div class="navbar">
    <div class="project-title">Career<span class="gold-text">Pilot</span></div>
    <div style="display:flex;align-items:center;gap:10px;">
        <button onclick="goDashboard()">Back to Dashboard</button>
        <button class="theme-toggle-profile" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
    </div>
</div>

<div class="profile-container" id="profileCard">
    <h2>My Profile</h2>

    <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name">
    </div>

    <div class="form-group">
        <label>Primary Email</label>
        <input type="email" id="email" disabled>
    </div>

    <div class="form-group">
        <label>Qualification</label>
        <input type="text" id="qualification">
    </div>

    <div class="form-group">
        <label>Secondary Email</label>
        <input type="email" id="secondaryEmail">
    </div>

    <div class="form-group">
        <label>Contact Number</label>
        <input type="text" id="contactNumber">
    </div>

    <div class="form-group">
        <label>Skills</label>
        <input type="text" id="skills">
    </div>

    <div class="form-group">
        <label>Preferred Domain</label>
        <input type="text" id="preferredDomain">
    </div>

    <div class="form-group">
        <label>Class / Degree</label>
        <input type="text" id="studentClass">
    </div>

    <div class="form-group">
        <label>College</label>
        <input type="text" id="college">
    </div>

    <button class="save-btn" onclick="saveProfile()">Save Profile</button>

</div>

<div class="social-section" id="socialSection">
    <h3>Social Profiles</h3>
    <div id="profilesContainer" class="added-profiles">
        <div class="profile-card">
            <div class="profile-link">
                <span class="profile-label">LinkedIn</span>

            <div class="profile-actions">
                <button class="add-btn" onclick="saveSocialProfile('linkedin')">Add</button>
                <button class="delete-btn" onclick="deleteSocialProfile('linkedin')">Delete</button>
            </div>
        </div>
        <div class="profile-card">
            <div class="profile-link">
                <span class="profile-label">GitHub</span>
                <input id="social-github" class="profile-value" type="text" placeholder="Paste GitHub URL here">
            </div>
            <div class="profile-actions">
                <button class="add-btn" onclick="saveSocialProfile('github')">Add</button>
                <button class="delete-btn" onclick="deleteSocialProfile('github')">Delete</button>
            </div>
        </div>
        <div class="profile-card">
            <div class="profile-link">
                <span class="profile-label">LeetCode</span>
                <input id="social-leetcode" class="profile-value" type="text" placeholder="Paste LeetCode URL here">
            </div>
            <div class="profile-actions">
                <button class="add-btn" onclick="saveSocialProfile('leetcode')">Add</button>
                <button class="delete-btn" onclick="deleteSocialProfile('leetcode')">Delete</button>
            </div>
        </div>
        <div class="profile-card">
            <div class="profile-link">
                <span class="profile-label">CodeChef</span>
                <input id="social-codechef" class="profile-value" type="text" placeholder="Paste CodeChef URL here">
            </div>
            <div class="profile-actions">
                <button class="add-btn" onclick="saveSocialProfile('codechef')">Add</button>
                <button class="delete-btn" onclick="deleteSocialProfile('codechef')">Delete</button>
            </div>
        </div>
        <div class="profile-card">
            <div class="profile-link">
                <span class="profile-label">HackerRank</span>
                <input id="social-hackerrank" class="profile-value" type="text" placeholder="Paste HackerRank URL here">
            </div>
            <div class="profile-actions">
                <button class="add-btn" onclick="saveSocialProfile('hackerrank')">Add</button>
                <button class="delete-btn" onclick="deleteSocialProfile('hackerrank')">Delete</button>
            </div>
        </div>
    </div>
</div>

<div class="project-section" id="projectSection">
    <h3>Projects Portfolio</h3>

    <div class="project-form-grid">
        <div class="full">
            <label for="projectTitle">Project Title</label>
            <input id="projectTitle" type="text" placeholder="AI Resume Analyzer">
        </div>
        <div class="full">
            <label for="projectTech">Tech Stack</label>
            <input id="projectTech" type="text" placeholder="React, Spring Boot, MySQL">
        </div>
        <div class="full">
            <label for="projectDeployedLink">Deployed Link</label>
            <input id="projectDeployedLink" type="text" placeholder="https://your-project.vercel.app">
        </div>
        <div class="full">
            <label for="projectGithubLink">GitHub Link (optional)</label>
            <input id="projectGithubLink" type="text" placeholder="https://github.com/username/repo">
        </div>
        <div class="full">
            <label for="projectDescription">Description</label>
            <textarea id="projectDescription" class="project-textarea" placeholder="Short summary of your project impact and features."></textarea>
        </div>
    </div>

    <div class="project-form-actions">
        <button class="project-save-btn" id="projectSaveBtn" onclick="saveProject()">Add Project</button>
        <button class="project-cancel-btn" id="projectCancelBtn" onclick="cancelProjectEdit()">Cancel Edit</button>
        <label class="project-featured-wrap" for="projectFeatured">
            <input id="projectFeatured" type="checkbox">
            Mark as featured
        </label>
    </div>

    <div id="projectStatus" class="status-message"></div>

    <div class="project-list" id="projectsList">
        <div class="project-empty">No projects added yet.</div>
    </div>
</div>

<script>

/* ================= THEME ================= */

function initTheme() {
    const saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    const btn = document.getElementById('themeToggle');
    if (btn) btn.textContent = saved === 'dark' ? '☀️' : '🌙';
}

function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme') || 'light';
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    const btn = document.getElementById('themeToggle');
    if (btn) btn.textContent = next === 'dark' ? '☀️' : '🌙';
}

/* ================= NAVIGATION ================= */

function goDashboard() {
    window.location.href = "dashboard.html";
}

/* ================= LOAD PROFILE FROM MYSQL ================= */

async function loadProfile() {
    try {
        const response = await fetch(
            `http://localhost:8089/api/students/profile?email=${userEmail}`
        );

        const data = await response.json();

        document.getElementById("name").value = data.name || "";
        document.getElementById("email").value = data.email || "";
        document.getElementById("qualification").value = data.qualification || "";
        document.getElementById("secondaryEmail").value = data.secondaryEmail || "";
        document.getElementById("contactNumber").value = data.contactNumber || "";
        document.getElementById("skills").value = data.skills || "";
        document.getElementById("preferredDomain").value = data.preferredDomain || "";
        document.getElementById("studentClass").value = data.studentClass || "";
        document.getElementById("college").value = data.college || "";
        
        return data;
    } catch (error) {
        console.error("Error loading profile:", error);
        return null;
    }
}

/* ================= SAVE PROFILE TO MYSQL ================= */

async function saveProfile() {

    const profileData = {
        name: document.getElementById("name").value,
        qualification: document.getElementById("qualification").value,
        secondaryEmail: document.getElementById("secondaryEmail").value,
        contactNumber: document.getElementById("contactNumber").value,
        skills: document.getElementById("skills").value,
        preferredDomain: document.getElementById("preferredDomain").value,
        studentClass: document.getElementById("studentClass").value,
        college: document.getElementById("college").value
    };

    const response = await fetch(
        `http://localhost:8089/api/students/profile?email=${userEmail}`,
        {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(profileData)
        }
    );

    const result = await response.text();

    document.getElementById("status").innerText = result;
}

/* ================= LOAD SOCIAL PROFILES ================= */

const socialPlatforms = [
    { platform: "LinkedIn", key: "linkedin", icon: "💼" },
    { platform: "GitHub", key: "github", icon: "🐙" },
    { platform: "LeetCode", key: "leetcode", icon: "📝" },
    { platform: "CodeChef", key: "codechef", icon: "👨‍💻" },
    { platform: "HackerRank", key: "hackerrank", icon: "🏆" }
];

let editingProjectId = null;

function escapeHtml(value) {
    return (value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function renderSocialProfiles(profiles) {
    const profileMap = {};
    (profiles || []).forEach((item) => {
        if (!item || !item.platform) return;
        profileMap[item.platform.toLowerCase()] = item.url || "";
    });

    document.getElementById("social-linkedin").value = profileMap.linkedin || "";
    document.getElementById("social-github").value = profileMap.github || "";
    document.getElementById("social-leetcode").value = profileMap.leetcode || "";
    document.getElementById("social-codechef").value = profileMap.codechef || "";
    document.getElementById("social-hackerrank").value = profileMap.hackerrank || "";
}

function normalizeSocialUrl(platformKey, rawValue) {
    const value = (rawValue || "").trim();
    if (!value) return "";

    if (/^https?:\/\//i.test(value)) {
        return value;
    }

    const clean = value.replace(/^@/, "").replace(/^\/+|\/+$/g, "");

    if (/\./.test(clean)) {
        return `https://${clean}`;
    }

    if (platformKey === "linkedin") return `https://www.linkedin.com/in/${clean}`;
    if (platformKey === "github") return `https://github.com/${clean}`;
    if (platformKey === "leetcode") return `https://leetcode.com/${clean}`;
    if (platformKey === "codechef") return `https://www.codechef.com/users/${clean}`;
    if (platformKey === "hackerrank") return `https://www.hackerrank.com/${clean}`;

    return `https://${clean}`;
}

function buildSocialProfilesPayload() {
    return [
        { platform: "LinkedIn", key: "linkedin", url: normalizeSocialUrl("linkedin", document.getElementById("social-linkedin").value) },
        { platform: "GitHub", key: "github", url: normalizeSocialUrl("github", document.getElementById("social-github").value) },
        { platform: "LeetCode", key: "leetcode", url: normalizeSocialUrl("leetcode", document.getElementById("social-leetcode").value) },
        { platform: "CodeChef", key: "codechef", url: normalizeSocialUrl("codechef", document.getElementById("social-codechef").value) },
        { platform: "HackerRank", key: "hackerrank", url: normalizeSocialUrl("hackerrank", document.getElementById("social-hackerrank").value) }
    ].filter(p => p.url.trim() !== "");
}

async function saveSocialProfile(platform) {
    const fieldId = `social-${platform}`;
    const value = document.getElementById(fieldId).value.trim();

    if (!value) {
        alert("Please enter a profile URL before adding");
        return;
    }

    document.getElementById(fieldId).value = normalizeSocialUrl(platform, value);

    try {
        const socialProfiles = buildSocialProfilesPayload();

        const response = await fetch(`http://localhost:8089/api/students/social?email=${userEmail}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ socialProfiles })
        });

        if (response.ok) {
            alert("Profile saved successfully!");
        } else {
            alert("Failed to save profile");
        }
    } catch (error) {
        console.error("Error saving social profile:", error);
        alert("Error saving profile");
    }
}

async function deleteSocialProfile(platform) {
    if (!confirm(`Delete ${platform.toUpperCase()} profile?`)) {
        return;
    }

    try {
        const fieldId = `social-${platform}`;
        document.getElementById(fieldId).value = "";

        const socialProfiles = buildSocialProfilesPayload();

        const response = await fetch(`http://localhost:8089/api/students/social?email=${userEmail}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ socialProfiles })
        });

        if (response.ok) {
            alert("Profile deleted successfully!");
        } else {
            alert("Failed to delete profile");
        }
    } catch (error) {
        console.error("Error deleting social profile:", error);
        alert("Error deleting profile");
    }
}

function openAddProfileModal(platformKey) {
    const selectedPlatform = socialPlatforms.find((item) => item.key === platformKey);
    if (!selectedPlatform) {
        alert("Invalid platform selected");
        return;
    }

    const modal = document.createElement('div');
    modal.id = 'addProfileModal';
    modal.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
    `;

    const content = document.createElement('div');
    content.style.cssText = `
        background: var(--bg-card);
        padding: 40px;
        border-radius: 15px;
        width: 90%;
        max-width: 500px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    `;

    const title = document.createElement('h2');
    title.textContent = `Add ${selectedPlatform.platform} Profile`;
    title.style.marginTop = '0';

    const urlGroup = document.createElement('div');
    urlGroup.style.marginBottom = '20px';

    const urlLabel = document.createElement('label');
    urlLabel.textContent = 'Profile URL:';
    urlLabel.style.display = 'block';
    urlLabel.style.fontWeight = '600';
    urlLabel.style.marginBottom = '8px';

    const urlInput = document.createElement('input');
    urlInput.id = 'addProfileURL';
    urlInput.type = 'url';
    urlInput.placeholder = 'https://...';
    urlInput.style.cssText = `
        width: 100%;
        padding: 12px;
        border: 1px solid ${getComputedStyle(document.documentElement).getPropertyValue('--border-color') || '#e2e8f0'};
        border-radius: 8px;
        font-size: 14px;
        box-sizing: border-box;
        background: ${getComputedStyle(document.documentElement).getPropertyValue('--input-bg') || '#fff'};
        color: ${getComputedStyle(document.documentElement).getPropertyValue('--text-dark') || '#1e293b'};
    `;

    urlGroup.appendChild(urlLabel);
    urlGroup.appendChild(urlInput);

    const buttonGroup = document.createElement('div');
    buttonGroup.style.cssText = `
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 30px;
    `;

    const cancelBtn = document.createElement('button');
    cancelBtn.textContent = 'Cancel';
    cancelBtn.style.cssText = `
        padding: 10px 20px;
        background: #e2e8f0;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
        transition: all 0.2s;
    `;
    cancelBtn.onmouseover = () => cancelBtn.style.background = '#cbd5e0';
    cancelBtn.onmouseout = () => cancelBtn.style.background = '#e2e8f0';
    cancelBtn.onclick = () => modal.remove();

    const addBtn = document.createElement('button');
    addBtn.textContent = 'Add Profile';
    addBtn.style.cssText = `
        padding: 10px 20px;
        background: #2ecc71;
        border: none;
        color: white;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
        transition: all 0.2s;
    `;
    addBtn.onmouseover = () => addBtn.style.background = '#27ae60';
    addBtn.onmouseout = () => addBtn.style.background = '#2ecc71';
    addBtn.onclick = async () => {
        const url = urlInput.value.trim();

        if (!url) {
            alert('Please enter a URL');
            return;
        }

        const fieldId = `social-${selectedPlatform.key}`;
        document.getElementById(fieldId).value = url;

        const socialProfiles = [
            { platform: "LinkedIn", key: "linkedin", url: document.getElementById("social-linkedin").value },
            { platform: "GitHub", key: "github", url: document.getElementById("social-github").value },
            { platform: "LeetCode", key: "leetcode", url: document.getElementById("social-leetcode").value },
            { platform: "CodeChef", key: "codechef", url: document.getElementById("social-codechef").value },
            { platform: "HackerRank", key: "hackerrank", url: document.getElementById("social-hackerrank").value }
        ].filter(p => p.url.trim() !== "");

        try {
            const response = await fetch(`http://localhost:8089/api/students/social?email=${userEmail}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ socialProfiles })
            });

            if (response.ok) {
                alert("Profile added successfully!");
                modal.remove();
            } else {
                alert("Failed to add profile");
            }
        } catch (error) {
            console.error("Error adding social profile:", error);
            alert("Error adding profile");
        }
    };

    buttonGroup.appendChild(cancelBtn);
    buttonGroup.appendChild(addBtn);

    content.appendChild(title);
    content.appendChild(urlGroup);
    content.appendChild(buttonGroup);
    modal.appendChild(content);
    document.body.appendChild(modal);
}

async function loadSocialProfiles() {
    try {
        const response = await fetch(
            `http://localhost:8089/api/students/social?email=${userEmail}`
        );

        if (!response.ok) {
            renderSocialProfiles([]);
            return;
        }

        const data = await response.json();
        renderSocialProfiles(Array.isArray(data) ? data : []);
    } catch (error) {
        console.error("Error loading social profiles:", error);
        renderSocialProfiles([]);
    }
}

function normalizeProjectUrl(rawValue) {
    const value = (rawValue || "").trim();
    if (!value) {
        return "";
    }

    if (/^https?:\/\//i.test(value)) {
        return value;
    }

    return `https://${value}`;
}

function collectProjectFormData() {
    return {
        title: document.getElementById("projectTitle").value.trim(),
        deployedLink: normalizeProjectUrl(document.getElementById("projectDeployedLink").value),
        githubLink: normalizeProjectUrl(document.getElementById("projectGithubLink").value),
        techStack: document.getElementById("projectTech").value.trim(),
        description: document.getElementById("projectDescription").value.trim(),
        featured: document.getElementById("projectFeatured").checked
    };
}

function resetProjectForm() {
    editingProjectId = null;
    document.getElementById("projectTitle").value = "";
    document.getElementById("projectDeployedLink").value = "";
    document.getElementById("projectGithubLink").value = "";
    document.getElementById("projectTech").value = "";
    document.getElementById("projectDescription").value = "";
    document.getElementById("projectFeatured").checked = false;
    document.getElementById("projectSaveBtn").innerText = "Add Project";
    document.getElementById("projectCancelBtn").style.display = "none";
}

function cancelProjectEdit() {
    resetProjectForm();
    document.getElementById("projectStatus").innerText = "";
}

function startProjectEdit(project) {
    editingProjectId = project.id;
    document.getElementById("projectTitle").value = project.title || "";
    document.getElementById("projectDeployedLink").value = project.deployedLink || "";
    document.getElementById("projectGithubLink").value = project.githubLink || "";
    document.getElementById("projectTech").value = project.techStack || "";
    document.getElementById("projectDescription").value = project.description || "";
    document.getElementById("projectFeatured").checked = Boolean(project.featured);
    document.getElementById("projectSaveBtn").innerText = "Update Project";
    document.getElementById("projectCancelBtn").style.display = "inline-block";
    document.getElementById("projectStatus").innerText = "Editing selected project";
}

function renderProjects(projects) {
    const container = document.getElementById("projectsList");

    if (!Array.isArray(projects) || projects.length === 0) {
        container.innerHTML = '<div class="project-empty">No projects added yet.</div>';
        return;
    }

    container.innerHTML = projects.map((project) => {
        const featured = project.featured ? '<span class="profile-label">Featured</span>' : '';
        const title = escapeHtml(project.title || "Untitled Project");
        const tech = escapeHtml(project.techStack || "Tech stack not specified");
        const description = escapeHtml(project.description || "No description added.");
        const deployedLink = project.deployedLink || "";
        const githubLink = project.githubLink || "";

        return `
            <div class="project-entry">
                <div class="project-entry-top">
                    <div>
                        <h4 class="project-entry-title">${title}</h4>
                        <div class="project-entry-stack">${tech}</div>
                    </div>
                    ${featured}
                </div>

                <p class="project-entry-desc">${description}</p>

                <div class="project-entry-links">
                    <a class="project-link-btn" href="${escapeHtml(deployedLink)}" target="_blank" rel="noopener noreferrer">Live Demo</a>
                    ${githubLink ? `<a class="project-link-btn" href="${escapeHtml(githubLink)}" target="_blank" rel="noopener noreferrer">GitHub</a>` : ""}
                </div>

                <div class="project-entry-actions">
                    <button class="project-entry-btn edit" onclick="editProjectById(${project.id})">Edit</button>
                    <button class="project-entry-btn delete" onclick="deleteProject(${project.id})">Delete</button>
                </div>
            </div>
        `;
    }).join("");
}

let cachedProjects = [];

function editProjectById(projectId) {
    const project = cachedProjects.find((item) => item.id === projectId);
    if (!project) {
        return;
    }
    startProjectEdit(project);
}

async function loadProjects() {
    try {
        const response = await fetch(`http://localhost:8089/api/students/projects?email=${encodeURIComponent(userEmail)}`);
        if (!response.ok) {
            cachedProjects = [];
            renderProjects([]);
            return;
        }

        const data = await response.json();
        cachedProjects = Array.isArray(data) ? data : [];
        renderProjects(cachedProjects);
    } catch (error) {
        console.error("Error loading projects:", error);
        cachedProjects = [];
        renderProjects([]);
    }
}

async function saveProject() {
    const payload = collectProjectFormData();
    const statusEl = document.getElementById("projectStatus");

    if (!payload.title) {
        statusEl.innerText = "Project title is required";
        return;
    }

    if (!payload.deployedLink) {
        statusEl.innerText = "Deployed link is required";
        return;
    }

    try {
        const isEdit = editingProjectId != null;
        const url = isEdit
            ? `http://localhost:8089/api/students/projects/${editingProjectId}?email=${encodeURIComponent(userEmail)}`
            : `http://localhost:8089/api/students/projects?email=${encodeURIComponent(userEmail)}`;

        const response = await fetch(url, {
            method: isEdit ? "PUT" : "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
            statusEl.innerText = data?.message || "Failed to save project";
            return;
        }

        statusEl.innerText = isEdit ? "Project updated successfully" : "Project added successfully";
        resetProjectForm();
        await loadProjects();
    } catch (error) {
        console.error("Error saving project:", error);
        statusEl.innerText = "Error saving project";
    }
}

async function deleteProject(projectId) {
    if (!confirm("Delete this project?")) {
        return;
    }

    const statusEl = document.getElementById("projectStatus");

    try {
        const response = await fetch(
            `http://localhost:8089/api/students/projects/${projectId}?email=${encodeURIComponent(userEmail)}`,
            { method: "DELETE" }
        );

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
            statusEl.innerText = data?.message || "Failed to delete project";
            return;
        }

        statusEl.innerText = "Project deleted successfully";
        if (editingProjectId === projectId) {
            resetProjectForm();
        }
        await loadProjects();
    } catch (error) {
        console.error("Error deleting project:", error);
        statusEl.innerText = "Error deleting project";
    }
}

/* ================= GSAP ANIMATION ================= */

async function initAnimations() {
    // THE ENTRANCE TIMELINE - Inspired by GSAP.com
    const tl = gsap.timeline({
        defaults: { ease: "power4.out" }
    });

    // 1. Make cards visible
    gsap.set(["#profileCard", "#socialSection", "#projectSection"], { autoAlpha: 1 });

    // 2. Main profile card entrance with 3D effect
    tl.from("#profileCard", {
        duration: 1.6,
        y: 120,
        scale: 0.85,
        rotationX: -15,
        opacity: 0,
        transformOrigin: "center bottom",
        ease: "expo.out"
    })
    
    // 3. Stagger in form groups
    .from(".form-group", {
        opacity: 0,
        y: 30,
        stagger: 0.08,
        duration: 0.8,
        ease: "power2.out"
    }, "-=1")
    
    // 4. Float in the save button
    .from(".save-btn", {
        opacity: 0,
        scale: 0.9,
        y: 20,
        duration: 0.6,
        ease: "back.out(1.5)"
    }, "-=0.4")

    .to("#socialSection", {
        opacity: 1,
        y: 0,
        duration: 0.7,
        ease: "power2.out"
    }, "-=0.2")

    .to("#projectSection", {
        opacity: 1,
        y: 0,
        duration: 0.7,
        ease: "power2.out"
    }, "-=0.2")

    .fromTo("#socialSection .profile-card", {
        opacity: 0,
        y: 18
    }, {
        opacity: 1,
        y: 0,
        stagger: 0.05,
        duration: 0.5,
        ease: "power2.out",
        clearProps: "opacity,transform"
    }, "-=0.45")

    .fromTo("#projectSection .project-entry", {
        opacity: 0,
        y: 18
    }, {
        opacity: 1,
        y: 0,
        stagger: 0.05,
        duration: 0.5,
        ease: "power2.out",
        clearProps: "opacity,transform"
    }, "-=0.45");

    // 5. Subtle floating animation on h2
    gsap.to("#profileCard h2", {
        y: -5,
        duration: 2,
        repeat: -1,
        yoyo: true,
        ease: "sine.inOut"
    });
}

// Load profile and then start animations
renderSocialProfiles([]);
renderProjects([]);
resetProjectForm();
initTheme();

Promise.all([loadProfile(), loadSocialProfiles(), loadProjects()]).then(() => {
    initAnimations();
});
</script>

</body>
</html>
