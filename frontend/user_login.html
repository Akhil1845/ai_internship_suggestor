<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CareerPilot – Student Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="user_login.css">
</head>
<body>

<!-- Background -->
<div class="bg">
  <div class="bg-grid"></div>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
</div>

<div class="page">

  <!-- CARD -->
  <div class="card-wrap">
    <div class="card">

      <div class="brand">
        <div class="brand-logo">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="2" y="7" width="16" height="11" rx="2.5" fill="rgba(12,14,18,0.9)"/>
            <path d="M7 7V5.5C7 4.4 7.9 3.5 9 3.5h2C12.1 3.5 13 4.4 13 5.5V7" stroke="rgba(12,14,18,0.8)" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="2" y1="12" x2="18" y2="12" stroke="rgba(12,14,18,0.6)" stroke-width="1.2"/>
            <circle cx="10" cy="12" r="1.5" fill="rgba(12,14,18,0.7)"/>
          </svg>
        </div>
        <span class="brand-wordmark">CareerPilot</span>
      </div>

      <!-- TAB BAR -->
      <div class="tab-bar" id="tab-bar">
        <div class="tab-slider" id="tab-slider"></div>
        <button class="tab-btn active" id="tab-login" onclick="switchPanel('login')">Sign In</button>
        <button class="tab-btn" id="tab-signup" onclick="switchPanel('signup')">Sign Up</button>
      </div>

      <div class="panels">

        <!-- LOGIN PANEL -->
        <div class="panel" id="panel-login">

          <div class="form-header">
            <div class="form-title">Welcome back</div>
            <div class="form-sub">Your next opportunity is waiting.</div>
          </div>

          <!-- Social -->
          <div class="social-row">
            <button class="btn-social" onclick="handleSocial('Google', 'login')">
              <svg width="15" height="15" viewBox="0 0 24 24"><path fill="#EA4335" d="M5.26 9.77A7.11 7.11 0 0 1 12 4.89c1.92 0 3.64.72 4.96 1.9L20.6 3.16A11.91 11.91 0 0 0 12 0C7.37 0 3.35 2.79 1.39 6.84l3.87 2.93Z"/><path fill="#FBBC05" d="M16.04 18.01A7.08 7.08 0 0 1 12 19.11c-3.09 0-5.73-1.96-6.74-4.72l-3.87 2.92C3.35 21.21 7.37 24 12 24c2.93 0 5.72-1.05 7.83-2.96l-3.79-3.03Z"/><path fill="#4285F4" d="M23.76 12.27c0-.86-.08-1.69-.23-2.49H12v4.99h6.61a5.54 5.54 0 0 1-2.57 3.75l3.79 3.03C21.97 19.55 23.76 16.18 23.76 12.27Z"/><path fill="#34A853" d="M5.26 14.39A7.17 7.17 0 0 1 4.89 12c0-.84.15-1.65.37-2.23L1.39 6.84A11.94 11.94 0 0 0 0 12c0 1.81.4 3.53 1.39 5.16l3.87-2.77Z"/></svg>
              Continue with Google
            </button>
          </div>

          <div class="divider">
            <div class="divider-line"></div>
            <span>or</span>
            <div class="divider-line"></div>
          </div>

          <form id="form-login" novalidate autocomplete="off">

            <div class="field">
              <label for="login-email">
                Username or Email
                <button type="button" class="lbl-link" onclick="handleForgotPassword()">Forgot password?</button>
              </label>
              <div class="input-wrap">
                <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                <input type="text" id="login-email" placeholder="username or you@university.edu" autocomplete="email"/>
              </div>
              <div class="field-error" id="login-email-err">
                <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5.5" stroke="currentColor"/><path d="M6 3.5v3M6 8.5v.5" stroke="currentColor" stroke-linecap="round"/></svg>
                <span></span>
              </div>
            </div>

            <div class="field">
              <label for="login-password">Password</label>
              <div class="input-wrap has-toggle">
                <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
                <button type="button" class="toggle-pw" data-target="login-password" aria-label="Toggle visibility">
                  <svg class="icon-eye" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="icon-eye-off" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
              </div>
              <div class="field-error" id="login-password-err">
                <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5.5" stroke="currentColor"/><path d="M6 3.5v3M6 8.5v.5" stroke="currentColor" stroke-linecap="round"/></svg>
                <span></span>
              </div>
            </div>

            <button type="submit" class="btn-primary" id="btn-login" disabled>
              <div class="spinner"></div>
              <span class="btn-text">Sign in →</span>
            </button>

          </form>

          <div class="footer-note" style="margin-top:16px">
            New here?
            <button class="link-btn" onclick="switchPanel('signup')">Create your account</button>
          </div>

        </div>

        <!-- SIGNUP PANEL -->
        <div class="panel hidden" id="panel-signup">

          <div class="form-header">
            <div class="form-title">Create account</div>
            <div class="form-sub">Join 12,000+ students landing better internships.</div>
          </div>

          <!-- Social -->
          <div class="social-row">
            <button class="btn-social" onclick="handleSocial('Google', 'signup')">
              <svg width="15" height="15" viewBox="0 0 24 24"><path fill="#EA4335" d="M5.26 9.77A7.11 7.11 0 0 1 12 4.89c1.92 0 3.64.72 4.96 1.9L20.6 3.16A11.91 11.91 0 0 0 12 0C7.37 0 3.35 2.79 1.39 6.84l3.87 2.93Z"/><path fill="#FBBC05" d="M16.04 18.01A7.08 7.08 0 0 1 12 19.11c-3.09 0-5.73-1.96-6.74-4.72l-3.87 2.92C3.35 21.21 7.37 24 12 24c2.93 0 5.72-1.05 7.83-2.96l-3.79-3.03Z"/><path fill="#4285F4" d="M23.76 12.27c0-.86-.08-1.69-.23-2.49H12v4.99h6.61a5.54 5.54 0 0 1-2.57 3.75l3.79 3.03C21.97 19.55 23.76 16.18 23.76 12.27Z"/><path fill="#34A853" d="M5.26 14.39A7.17 7.17 0 0 1 4.89 12c0-.84.15-1.65.37-2.23L1.39 6.84A11.94 11.94 0 0 0 0 12c0 1.81.4 3.53 1.39 5.16l3.87-2.77Z"/></svg>
              Google
            </button>
          </div>

          <div class="divider">
            <div class="divider-line"></div>
            <span>or</span>
            <div class="divider-line"></div>
          </div>

          <form id="form-signup" novalidate autocomplete="off">

            <div class="field">
              <label for="signup-name">Full name</label>
              <div class="input-wrap">
                <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <input type="text" id="signup-name" placeholder="Jane Smith" autocomplete="name"/>
              </div>
              <div class="field-error" id="signup-name-err">
                <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5.5" stroke="currentColor"/><path d="M6 3.5v3M6 8.5v.5" stroke="currentColor" stroke-linecap="round"/></svg>
                <span></span>
              </div>
            </div>

            <div class="field">
              <label for="signup-username">Username</label>
              <div class="input-wrap">
                <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M8.5 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <input type="text" id="signup-username" placeholder="janesmith" autocomplete="username"/>
              </div>
              <div class="field-error" id="signup-username-err">
                <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5.5" stroke="currentColor"/><path d="M6 3.5v3M6 8.5v.5" stroke="currentColor" stroke-linecap="round"/></svg>
                <span></span>
              </div>
            </div>

            <div class="field">
              <label for="signup-email">Email address</label>
              <div class="input-wrap">
                <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                <input type="email" id="signup-email" placeholder="you@university.edu" autocomplete="email"/>
              </div>
              <div class="field-error" id="signup-email-err">
                <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5.5" stroke="currentColor"/><path d="M6 3.5v3M6 8.5v.5" stroke="currentColor" stroke-linecap="round"/></svg>
                <span></span>
              </div>
            </div>

            <div class="field">
              <label for="signup-password">Password</label>
              <div class="input-wrap has-toggle">
                <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <input type="password" id="signup-password" placeholder="Min. 8 characters" autocomplete="new-password"/>
                <button type="button" class="toggle-pw" data-target="signup-password" aria-label="Toggle visibility">
                  <svg class="icon-eye" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="icon-eye-off" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
              </div>
              <div class="strength-bar" id="strength-bar">
                <div class="strength-segments">
                  <div class="strength-seg" id="seg-1"></div>
                  <div class="strength-seg" id="seg-2"></div>
                  <div class="strength-seg" id="seg-3"></div>
                  <div class="strength-seg" id="seg-4"></div>
                </div>
                <div class="strength-label" id="strength-label"></div>
              </div>
              <div class="field-error" id="signup-password-err">
                <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5.5" stroke="currentColor"/><path d="M6 3.5v3M6 8.5v.5" stroke="currentColor" stroke-linecap="round"/></svg>
                <span></span>
              </div>
            </div>

            <div class="field">
              <label for="signup-confirm">Confirm password</label>
              <div class="input-wrap has-toggle">
                <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                <input type="password" id="signup-confirm" placeholder="Repeat your password" autocomplete="new-password"/>
                <button type="button" class="toggle-pw" data-target="signup-confirm" aria-label="Toggle visibility">
                  <svg class="icon-eye" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="icon-eye-off" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
              </div>
              <div class="field-error" id="signup-confirm-err">
                <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5.5" stroke="currentColor"/><path d="M6 3.5v3M6 8.5v.5" stroke="currentColor" stroke-linecap="round"/></svg>
                <span></span>
              </div>
            </div>

            <button type="submit" class="btn-primary" id="btn-signup" disabled>
              <div class="spinner"></div>
              <span class="btn-text">Create account →</span>
            </button>

          </form>

          <div class="terms-note">
            By creating an account you agree to our
            <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
          </div>

          <div class="footer-note">
            Already a member?
            <button class="link-btn" onclick="switchPanel('login')">Sign in</button>
          </div>

        </div>

      </div>
    </div>
  </div>

</div>

<script src="user_login.js"></script>

</body>
</html>
