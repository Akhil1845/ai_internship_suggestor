<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResumeForge — Templates</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
	--bg: #010409;
	--surface: #0d1117;
	--surface-2: #161b22;
	--border: #21262d;
	--text: #e6edf3;
	--muted: #8b949e;
	--accent: #388bfd;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
	font-family: 'DM Sans', sans-serif;
	background: var(--bg);
	color: var(--text);
	min-height: 100vh;
}
.topbar {
	height: 56px;
	border-bottom: 1px solid var(--border);
	background: var(--surface);
	display: flex;
	align-items: center;
	justify-content: space-between;
	padding: 0 16px;
}
.logo {
	font-family: 'Syne', sans-serif;
	font-size: 18px;
	font-weight: 800;
	display: flex;
	align-items: center;
	gap: 8px;
}
.logo-icon {
	width: 28px;
	height: 28px;
	border-radius: 6px;
	display: flex;
	align-items: center;
	justify-content: center;
	background: linear-gradient(135deg, #2563eb, #7c3aed);
}
.logo span { color: #79c0ff; }
.btn {
	border: 1px solid var(--border);
	background: transparent;
	color: var(--text);
	padding: 7px 12px;
	border-radius: 6px;
	font-size: 12px;
	font-weight: 600;
	cursor: pointer;
}
.btn:hover { background: var(--surface-2); }

.wrap {
	max-width: 1100px;
	margin: 0 auto;
	padding: 24px 18px 28px;
}
.title {
	font-size: 22px;
	font-weight: 800;
	margin-bottom: 6px;
}
.sub {
	color: var(--muted);
	font-size: 13px;
	margin-bottom: 16px;
}

.tpl-grid {
	display: grid;
	grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
	gap: 12px;
}
.tpl-card {
	border: 2px solid var(--border);
	border-radius: 10px;
	overflow: hidden;
	background: #ffffff;
	cursor: pointer;
	transition: all 0.15s ease;
}
.tpl-card:hover {
	border-color: var(--accent);
	transform: translateY(-2px);
	box-shadow: 0 8px 18px rgba(56, 139, 253, 0.25);
}
.tpl-card.active {
	border-color: var(--accent);
	box-shadow: 0 0 0 2px rgba(56, 139, 253, 0.35);
}
.tpl-preview {
	aspect-ratio: 0.707;
	background: #f8fafc;
}
.tpl-preview svg { width: 100%; height: 100%; display: block; }
.tpl-name {
	background: var(--surface-2);
	color: var(--text);
	font-size: 11px;
	font-weight: 700;
	letter-spacing: 0.5px;
	text-transform: uppercase;
	text-align: center;
	padding: 10px 8px;
}
.actions {
	margin-top: 16px;
	display: flex;
	justify-content: flex-end;
}
.btn-primary {
	border: none;
	background: #1f6feb;
	color: #fff;
	padding: 9px 14px;
}
.btn-primary:hover { background: #388bfd; }
</style>
</head>
<body>
	<div class="topbar">
		<div class="logo">
			<div class="logo-icon">📄</div>
			Resume<span>Forge</span>
		</div>
		<button class="btn" onclick="location.href='resume.html'">← Back to Resume</button>
	</div>

	<div class="wrap">
		<div class="title">Choose a Template</div>
		<div class="sub">Select one template layout. It will be saved and applied in the resume editor.</div>
		<div class="tpl-grid" id="tpl-grid"></div>
		<div class="actions">
			<button class="btn btn-primary" onclick="openResume()">Use Template</button>
		</div>
	</div>

<script>
const TEMPLATES = [
	{ id:'modern',       label:'Modern',       color:'#2563eb' },
	{ id:'classic',      label:'Classic',      color:'#7c3aed' },
	{ id:'minimal',      label:'Minimal',      color:'#0f172a' },
	{ id:'creative',     label:'Creative',     color:'#db2777' },
	{ id:'professional', label:'Professional', color:'#0891b2' },
	{ id:'executive',    label:'Executive',    color:'#1e3a5f' },
	{ id:'compact',      label:'Compact',      color:'#059669' },
	{ id:'elegant',      label:'Elegant',      color:'#92400e' },
	{ id:'tech',         label:'Tech',         color:'#58a6ff' },
	{ id:'infographic',  label:'Infographic',  color:'#7c3aed' },
	{ id:'minimalist',   label:'Minimalist',   color:'#64748b' },
	{ id:'bold',         label:'Bold',         color:'#dc2626' }
];

let selectedTemplate = 'modern';

function readState() {
	try {
		const data = localStorage.getItem('rf_state');
		if (!data) return {};
		return JSON.parse(data) || {};
	} catch (_) {
		return {};
	}
}

function saveTemplate(id) {
	const state = readState();
	state.template = id;
	localStorage.setItem('rf_state', JSON.stringify(state));
}

function selectTemplate(id) {
	selectedTemplate = id;
	saveTemplate(id);
	buildTplGrid();
}

function openResume() {
	location.href = 'resume.html';
}

function tplThumbSVG(t) {
	const c = t.color;
	const isDark = t.id === 'tech';
	return `
		<svg viewBox="0 0 120 170" aria-hidden="true">
			<rect width="120" height="170" fill="${isDark ? '#0d1117' : '#ffffff'}"/>
			<rect width="120" height="34" fill="${c}" opacity="${isDark ? '0.2' : '0.9'}"/>
			<circle cx="18" cy="17" r="9" fill="${isDark ? '#21262d' : '#e2e8f0'}"/>
			<rect x="32" y="11" width="46" height="5" rx="2.5" fill="${isDark ? '#e6edf3' : '#1e293b'}" opacity="0.9"/>
			<rect x="32" y="20" width="30" height="3" rx="1.5" fill="${c}"/>

			<rect x="0" y="34" width="42" height="136" fill="${isDark ? '#161b22' : '#f8fafc'}"/>
			<rect x="42" y="34" width="1" height="136" fill="${isDark ? '#21262d' : '#e2e8f0'}"/>

			<rect x="6" y="43" width="28" height="3" rx="1.5" fill="${c}"/>
			<rect x="6" y="49" width="30" height="2" rx="1" fill="${isDark ? '#8b949e' : '#94a3b8'}"/>
			<rect x="6" y="56" width="12" height="8" rx="4" fill="${c}" opacity="0.55"/>
			<rect x="21" y="56" width="12" height="8" rx="4" fill="${c}" opacity="0.35"/>
			<rect x="6" y="71" width="24" height="2.5" rx="1.2" fill="${isDark ? '#8b949e' : '#64748b'}"/>
			<rect x="6" y="76" width="28" height="2.5" rx="1.2" fill="${isDark ? '#8b949e' : '#94a3b8'}"/>

			<rect x="48" y="44" width="34" height="4" rx="2" fill="${isDark ? '#e6edf3' : '#1e293b'}"/>
			<rect x="48" y="52" width="62" height="3" rx="1.5" fill="${isDark ? '#8b949e' : '#94a3b8'}"/>
			<rect x="48" y="58" width="58" height="3" rx="1.5" fill="${isDark ? '#8b949e' : '#94a3b8'}"/>
			<rect x="48" y="68" width="34" height="4" rx="2" fill="${isDark ? '#e6edf3' : '#1e293b'}"/>
			<rect x="48" y="76" width="60" height="3" rx="1.5" fill="${isDark ? '#8b949e' : '#94a3b8'}"/>
			<rect x="48" y="82" width="50" height="3" rx="1.5" fill="${isDark ? '#8b949e' : '#94a3b8'}"/>
		</svg>
	`;
}

function buildTplGrid() {
	const grid = document.getElementById('tpl-grid');
	grid.innerHTML = TEMPLATES.map(t => `
		<div class="tpl-card ${selectedTemplate === t.id ? 'active' : ''}" onclick="selectTemplate('${t.id}')">
			<div class="tpl-preview">${tplThumbSVG(t)}</div>
			<div class="tpl-name">${selectedTemplate === t.id ? '✓ ' : ''}${t.label}</div>
		</div>
	`).join('');
}

function init() {
	const saved = readState();
	if (saved.template && TEMPLATES.some(t => t.id === saved.template)) {
		selectedTemplate = saved.template;
	}
	saveTemplate(selectedTemplate);
	buildTplGrid();
}

init();
</script>
</body>
</html>
