<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResumeForge — Templates</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
	--bg: #010409;
	--surface: #0d1117;
	--surface-2: #161b22;
	--border: #21262d;
	--text: #e6edf3;
	--muted: #8b949e;
	--accent: #388bfd;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
	font-family: 'DM Sans', sans-serif;
	background: var(--bg);
	color: var(--text);
	min-height: 100vh;
}
.topbar {
	height: 56px;
	border-bottom: 1px solid var(--border);
	background: var(--surface);
	display: flex;
	align-items: center;
	justify-content: space-between;
	padding: 0 16px;
}
.logo {
	font-family: 'Syne', sans-serif;
	font-size: 18px;
	font-weight: 800;
	display: flex;
	align-items: center;
	gap: 8px;
}
.logo-icon {
	width: 28px;
	height: 28px;
	border-radius: 6px;
	display: flex;
	align-items: center;
	justify-content: center;
	background: linear-gradient(135deg, #2563eb, #7c3aed);
}
.logo span { color: #79c0ff; }
.btn {
	border: 1px solid var(--border);
	background: transparent;
	color: var(--text);
	padding: 7px 12px;
	border-radius: 6px;
	font-size: 12px;
	font-weight: 600;
	cursor: pointer;
}
.btn:hover { background: var(--surface-2); }

.wrap {
	max-width: 1100px;
	margin: 0 auto;
	padding: 24px 18px 28px;
}
.title {
	font-size: 22px;
	font-weight: 800;
	margin-bottom: 6px;
}
.sub {
	color: var(--muted);
	font-size: 13px;
	margin-bottom: 16px;
}

.tpl-grid {
	display: grid;
	grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
	gap: 12px;
}
.tpl-card {
	border: 2px solid var(--border);
	border-radius: 10px;
	overflow: hidden;
	background: #ffffff;
	cursor: pointer;
	transition: all 0.15s ease;
}
.tpl-card:hover {
	border-color: var(--accent);
	transform: translateY(-2px);
	box-shadow: 0 8px 18px rgba(56, 139, 253, 0.25);
}
.tpl-card.active {
	border-color: var(--accent);
	box-shadow: 0 0 0 2px rgba(56, 139, 253, 0.35);
}
.tpl-preview {
	aspect-ratio: 0.707;
	background: #f8fafc;
}
.tpl-preview svg { width: 100%; height: 100%; display: block; }
.tpl-name {
	background: var(--surface-2);
	color: var(--text);
	font-size: 11px;
	font-weight: 700;
	letter-spacing: 0.5px;
	text-transform: uppercase;
	text-align: center;
	padding: 10px 8px;
}
.actions {
	margin-top: 16px;
	display: flex;
	justify-content: flex-end;
}
.btn-primary {
	border: none;
	background: #1f6feb;
	color: #fff;
	padding: 9px 14px;
}
.btn-primary:hover { background: #388bfd; }
</style>
</head>
<body>
	<div class="topbar">
		<div class="logo">
			<div class="logo-icon">📄</div>
			Resume<span>Forge</span>
		</div>
		<div style="display:flex;gap:10px;">
			<button class="btn" onclick="location.href='dashboard.html'">← Dashboard</button>
			<button class="btn" onclick="location.href='resume.html'">← Back to Resume</button>
		</div>
	</div>

	<div class="wrap">
		<div class="title">Choose a Template</div>
		<div class="sub">Select one template layout. It will be saved and applied in the resume editor.</div>
		<div class="tpl-grid" id="tpl-grid"></div>
		<div class="actions">
			<button class="btn btn-primary" onclick="openResume()">Use Template</button>
		</div>
	</div>

<script>
const TEMPLATES = [
	{ id:'modern',       label:'Modern',       color:'#2563eb' },
	{ id:'classic',      label:'Classic',      color:'#7c3aed' },
	{ id:'minimal',      label:'Minimal',      color:'#0f172a' },
	{ id:'creative',     label:'Creative',     color:'#db2777' },
	{ id:'professional', label:'Professional', color:'#0891b2' },
	{ id:'executive',    label:'Executive',    color:'#1e3a5f' },
	{ id:'compact',      label:'Compact',      color:'#059669' },
	{ id:'elegant',      label:'Elegant',      color:'#92400e' },
	{ id:'tech',         label:'Tech',         color:'#58a6ff' },
	{ id:'infographic',  label:'Infographic',  color:'#7c3aed' },
	{ id:'minimalist',   label:'Minimalist',   color:'#64748b' },
	{ id:'bold',         label:'Bold',         color:'#dc2626' },
	{ id:'white',        label:'White Basic',  color:'#e2e8f0' },
	{ id:'ats',          label:'ATS Focus',    color:'#0f172a' },
	{ id:'corporate',    label:'Corporate Pro',color:'#0f766e' },
	{ id:'timeline',     label:'Timeline Edge',color:'#9333ea' },
	{ id:'academic',     label:'Academic CV',  color:'#334155' },
	{ id:'federal',      label:'Federal Std',  color:'#1d4ed8' }
];

let selectedTemplate = 'modern';

function readState() {
	try {
		const data = localStorage.getItem('rf_state');
		if (!data) return {};
		return JSON.parse(data) || {};
	} catch (_) {
		return {};
	}
}

function saveTemplate(id) {
	const state = readState();
	state.template = id;
	localStorage.setItem('rf_state', JSON.stringify(state));
}

function selectTemplate(id) {
	selectedTemplate = id;
	saveTemplate(id);
	buildTplGrid();
}

function openResume() {
	location.href = 'resume.html';
}

function tplThumbSVG(t) {
	if (t.id === 'ats') {
		return `
			<svg viewBox="0 0 120 170" aria-hidden="true">
				<rect width="120" height="170" fill="#ffffff"/>
				<rect x="10" y="12" width="68" height="5" rx="2.5" fill="#111827"/>
				<rect x="10" y="22" width="42" height="3" rx="1.5" fill="#64748b"/>
				<rect x="10" y="34" width="100" height="1" fill="#e5e7eb"/>
				<rect x="10" y="42" width="28" height="3" rx="1.5" fill="#0f172a"/>
				<rect x="10" y="49" width="98" height="2" rx="1" fill="#94a3b8"/>
				<rect x="10" y="54" width="92" height="2" rx="1" fill="#94a3b8"/>
				<rect x="10" y="63" width="30" height="3" rx="1.5" fill="#0f172a"/>
				<rect x="10" y="70" width="96" height="2" rx="1" fill="#94a3b8"/>
				<rect x="10" y="75" width="88" height="2" rx="1" fill="#94a3b8"/>
			</svg>
		`;
	}

	if (t.id === 'corporate') {
		return `
			<svg viewBox="0 0 120 170" aria-hidden="true">
				<rect width="120" height="170" fill="#ffffff"/>
				<rect width="120" height="30" fill="#0f766e"/>
				<rect x="10" y="10" width="52" height="4" rx="2" fill="#ffffff"/>
				<rect x="10" y="18" width="34" height="2.5" rx="1.2" fill="#ccfbf1"/>
				<rect x="0" y="30" width="38" height="140" fill="#f0fdfa"/>
				<rect x="38" y="30" width="1" height="140" fill="#ccfbf1"/>
				<rect x="6" y="40" width="26" height="3" rx="1.5" fill="#0f766e"/>
				<rect x="6" y="46" width="24" height="2" rx="1" fill="#64748b"/>
				<rect x="44" y="40" width="34" height="3" rx="1.5" fill="#134e4a"/>
				<rect x="44" y="47" width="66" height="2" rx="1" fill="#94a3b8"/>
				<rect x="44" y="52" width="61" height="2" rx="1" fill="#94a3b8"/>
			</svg>
		`;
	}

	if (t.id === 'timeline') {
		return `
			<svg viewBox="0 0 120 170" aria-hidden="true">
				<rect width="120" height="170" fill="#ffffff"/>
				<rect width="120" height="30" fill="#ede9fe"/>
				<rect x="10" y="10" width="56" height="4" rx="2" fill="#5b21b6"/>
				<rect x="10" y="18" width="40" height="2.5" rx="1.2" fill="#7c3aed"/>
				<rect x="59" y="36" width="2" height="124" fill="#d8b4fe"/>
				<circle cx="60" cy="50" r="3" fill="#7c3aed"/>
				<circle cx="60" cy="74" r="3" fill="#7c3aed"/>
				<circle cx="60" cy="98" r="3" fill="#7c3aed"/>
				<rect x="10" y="47" width="42" height="2.5" rx="1.2" fill="#475569"/>
				<rect x="10" y="52" width="36" height="2" rx="1" fill="#94a3b8"/>
				<rect x="68" y="71" width="42" height="2.5" rx="1.2" fill="#475569"/>
				<rect x="72" y="76" width="34" height="2" rx="1" fill="#94a3b8"/>
			</svg>
		`;
	}

	if (t.id === 'academic') {
		return `
			<svg viewBox="0 0 120 170" aria-hidden="true">
				<rect width="120" height="170" fill="#ffffff"/>
				<rect x="10" y="12" width="62" height="4" rx="2" fill="#1f2937"/>
				<rect x="10" y="20" width="36" height="2.5" rx="1.2" fill="#64748b"/>
				<rect x="10" y="30" width="100" height="1.5" fill="#cbd5e1"/>
				<rect x="10" y="40" width="30" height="2.8" rx="1.4" fill="#334155"/>
				<rect x="10" y="46" width="100" height="2" rx="1" fill="#94a3b8"/>
				<rect x="10" y="51" width="95" height="2" rx="1" fill="#94a3b8"/>
				<rect x="10" y="60" width="26" height="2.8" rx="1.4" fill="#334155"/>
				<rect x="10" y="66" width="96" height="2" rx="1" fill="#94a3b8"/>
				<rect x="10" y="71" width="90" height="2" rx="1" fill="#94a3b8"/>
			</svg>
		`;
	}

	if (t.id === 'federal') {
		return `
			<svg viewBox="0 0 120 170" aria-hidden="true">
				<rect width="120" height="170" fill="#ffffff"/>
				<rect width="120" height="28" fill="#dbeafe"/>
				<rect x="10" y="9" width="58" height="4" rx="2" fill="#1e3a8a"/>
				<rect x="10" y="16" width="45" height="2.5" rx="1.2" fill="#1d4ed8"/>
				<rect x="10" y="34" width="100" height="4" rx="2" fill="#1e3a8a"/>
				<rect x="10" y="42" width="100" height="2" rx="1" fill="#93c5fd"/>
				<rect x="10" y="50" width="100" height="4" rx="2" fill="#1e3a8a"/>
				<rect x="10" y="58" width="96" height="2" rx="1" fill="#93c5fd"/>
				<rect x="10" y="66" width="100" height="4" rx="2" fill="#1e3a8a"/>
				<rect x="10" y="74" width="93" height="2" rx="1" fill="#93c5fd"/>
			</svg>
		`;
	}

	const c = t.color;
	const isDark = t.id === 'tech';
	const isWhite = t.id === 'white';
	return `
		<svg viewBox="0 0 120 170" aria-hidden="true">
			<rect width="120" height="170" fill="${isDark ? '#0d1117' : '#ffffff'}"/>
			<rect width="120" height="34" fill="${isWhite ? '#ffffff' : c}" opacity="${isDark ? '0.2' : (isWhite ? '1' : '0.9')}"/>
			<rect x="10" y="11" width="60" height="5" rx="2.5" fill="${isDark ? '#e6edf3' : '#1e293b'}" opacity="0.9"/>
			<rect x="10" y="20" width="42" height="3" rx="1.5" fill="${isWhite ? '#64748b' : c}"/>

			<rect x="0" y="34" width="42" height="136" fill="${isDark ? '#161b22' : '#f8fafc'}"/>
			<rect x="42" y="34" width="1" height="136" fill="${isDark ? '#21262d' : '#e2e8f0'}"/>

			<rect x="6" y="43" width="28" height="3" rx="1.5" fill="${isWhite ? '#334155' : c}"/>
			<rect x="6" y="49" width="30" height="2" rx="1" fill="${isDark ? '#8b949e' : '#94a3b8'}"/>
			<rect x="6" y="56" width="26" height="2.5" rx="1.2" fill="${isDark ? '#8b949e' : '#64748b'}"/>
			<rect x="6" y="62" width="30" height="2.5" rx="1.2" fill="${isDark ? '#8b949e' : '#94a3b8'}"/>

			<rect x="48" y="44" width="34" height="4" rx="2" fill="${isDark ? '#e6edf3' : '#1e293b'}"/>
			<rect x="48" y="52" width="62" height="3" rx="1.5" fill="${isDark ? '#8b949e' : '#94a3b8'}"/>
			<rect x="48" y="58" width="58" height="3" rx="1.5" fill="${isDark ? '#8b949e' : '#94a3b8'}"/>
			<rect x="48" y="68" width="34" height="4" rx="2" fill="${isDark ? '#e6edf3' : '#1e293b'}"/>
			<rect x="48" y="76" width="60" height="3" rx="1.5" fill="${isDark ? '#8b949e' : '#94a3b8'}"/>
			<rect x="48" y="82" width="50" height="3" rx="1.5" fill="${isDark ? '#8b949e' : '#94a3b8'}"/>
		</svg>
	`;
}

function buildTplGrid() {
	const grid = document.getElementById('tpl-grid');
	grid.innerHTML = TEMPLATES.map(t => `
		<div class="tpl-card ${selectedTemplate === t.id ? 'active' : ''}" onclick="selectTemplate('${t.id}')">
			<div class="tpl-preview">${tplThumbSVG(t)}</div>
			<div class="tpl-name">${selectedTemplate === t.id ? '✓ ' : ''}${t.label}</div>
		</div>
	`).join('');
}

function init() {
	const saved = readState();
	if (saved.template && TEMPLATES.some(t => t.id === saved.template)) {
		selectedTemplate = saved.template;
	}
	saveTemplate(selectedTemplate);
	buildTplGrid();
}

init();
</script>
</body>
</html>
