<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internship Prep — CareerPilot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   CSS Variables — light default
   ══════════════════════════════════════════════ */
:root {
    --bg-page:    #f0f9ff;
    --bg-card:    #ffffff;
    --bg-raised:  #e8f4fd;
    --text-primary: #1e293b;
    --text-secondary: #64748b;
    --accent:     #ff8c05;
    --accent-2:   #ffbb33;
    --border-default: #e2e8f0;
    --skeleton-base: #e2e8f0;
    --skeleton-shine: #f8fafc;
    --badge-easy-bg: #dcfce7;   --badge-easy-fg: #166534;
    --badge-med-bg:  #fef9c3;   --badge-med-fg:  #854d0e;
    --badge-hard-bg: #fee2e2;   --badge-hard-fg: #991b1b;
    --shadow: 0 4px 24px rgba(0,0,0,.07);
    --shadow-hover: 0 8px 32px rgba(0,0,0,.12);
    --radius: 14px;
    --navbar-bg: #ffffff;
}

[data-theme="dark"] {
    --bg-page:    #0f172a;
    --bg-card:    #1e293b;
    --bg-raised:  #1a2947;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --accent:     #fb923c;
    --accent-2:   #fbbf24;
    --border-default: #334155;
    --skeleton-base: #334155;
    --skeleton-shine: #475569;
    --badge-easy-bg: #14532d;   --badge-easy-fg: #86efac;
    --badge-med-bg:  #713f12;   --badge-med-fg:  #fde68a;
    --badge-hard-bg: #7f1d1d;   --badge-hard-fg: #fca5a5;
    --shadow: 0 4px 24px rgba(0,0,0,.35);
    --shadow-hover: 0 8px 32px rgba(0,0,0,.55);
    --navbar-bg: #1e293b;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
    background: var(--bg-page);
    color: var(--text-primary);
    min-height: 100vh;
    transition: background .3s, color .3s;
}

/* ══ NAVBAR ═══════════════════════════════════ */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 48px;
    background: var(--navbar-bg);
    box-shadow: 0 2px 16px rgba(0,0,0,.06);
    position: sticky;
    top: 0;
    z-index: 100;
}

.nav-brand { font-size: 20px; font-weight: 800; color: var(--text-primary); }
.nav-brand span { color: var(--accent); }

.nav-right { display: flex; align-items: center; gap: 10px; }

.nav-btn {
    padding: 9px 18px;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    color: #fff;
    transition: transform .15s, box-shadow .15s;
}
.nav-btn:hover { transform: scale(1.04); box-shadow: 0 4px 14px rgba(255,140,5,.35); }
.nav-btn.outline {
    background: transparent;
    border: 1.5px solid var(--border-default);
    color: var(--text-primary);
}
.nav-btn.outline:hover { border-color: var(--accent); color: var(--accent); box-shadow: none; transform: none; }

.theme-toggle {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1.5px solid var(--border-default);
    background: var(--bg-card);
    cursor: pointer;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .2s;
}
.theme-toggle:hover { border-color: var(--accent); }

/* ══ PAGE HEADER ══════════════════════════════ */
.page-header {
    padding: 52px 48px 32px;
    max-width: 1280px;
    margin: 0 auto;
}

.page-header h1 {
    font-size: 36px;
    font-weight: 800;
    line-height: 1.2;
}
.page-header h1 span { color: var(--accent); }

.page-header p {
    margin-top: 10px;
    color: var(--text-secondary);
    font-size: 16px;
    max-width: 600px;
}

/* ══ SEARCH BAR ═══════════════════════════════ */
.search-wrap {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 48px 28px;
    position: relative;
}

.search-icon {
    position: absolute;
    left: 66px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 17px;
    pointer-events: none;
    color: var(--text-secondary);
}

.search-input {
    width: 100%;
    padding: 14px 18px 14px 46px;
    border: 1.5px solid var(--border-default);
    border-radius: 12px;
    font-family: inherit;
    font-size: 15px;
    background: var(--bg-card);
    color: var(--text-primary);
    transition: border-color .2s, box-shadow .2s;
    outline: none;
}
.search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255,140,5,.15);
}
.search-input::placeholder { color: var(--text-secondary); }

/* ══ TRENDING PILLS ═══════════════════════════ */
.trending-section {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 48px 28px;
}

.trending-section h3 {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-secondary);
    margin-bottom: 12px;
}

.trending-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.pill {
    padding: 6px 14px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 600;
    background: var(--bg-raised);
    border: 1.5px solid var(--border-default);
    color: var(--text-primary);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
}
.pill:hover, .pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
}

/* ══ COMPANY TABS ═════════════════════════════ */
.tabs-section {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 48px 10px;
}

.tabs-label {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-secondary);
    margin-bottom: 10px;
}

.tabs-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 18px;
}

.tab-btn {
    padding: 8px 18px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    border: 1.5px solid var(--border-default);
    background: var(--bg-card);
    color: var(--text-primary);
    cursor: pointer;
    transition: all .15s;
}
.tab-btn:hover { border-color: var(--accent); color: var(--accent); }
.tab-btn.active {
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-color: transparent;
    color: #fff;
    box-shadow: 0 4px 12px rgba(255,140,5,.3);
}

/* ══ CATEGORY TABS ════════════════════════════ */
.cat-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
}

.cat-btn {
    padding: 6px 16px;
    border-radius: 30px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    border: 1.5px solid var(--border-default);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all .15s;
}
.cat-btn:hover { border-color: var(--accent); color: var(--accent); }
.cat-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
}

/* ══ RESULTS HEADER ═══════════════════════════ */
.results-header {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 48px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
}

.results-count {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 600;
}

.scrape-btn {
    padding: 9px 18px;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    background: var(--bg-raised);
    border: 1.5px solid var(--border-default);
    color: var(--text-secondary);
    transition: all .2s;
    display: flex; align-items: center; gap: 6px;
}
.scrape-btn:hover { border-color: var(--accent); color: var(--accent); }
.scrape-btn:disabled { opacity: .5; cursor: not-allowed; }

/* ══ TOPIC GRID ═══════════════════════════════ */
.topic-grid {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 48px 60px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
}

/* ══ TOPIC CARD ═══════════════════════════════ */
.topic-card {
    background: var(--bg-card);
    border: 1.5px solid var(--border-default);
    border-radius: var(--radius);
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    box-shadow: var(--shadow);
    transition: transform .2s, box-shadow .2s, border-color .2s;
    cursor: pointer;
}
.topic-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-hover);
    border-color: var(--accent);
}

.card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
}

.card-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.4;
    flex: 1;
}

.card-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    flex-shrink: 0;
}

.badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .04em;
}
.badge.easy   { background: var(--badge-easy-bg); color: var(--badge-easy-fg); }
.badge.medium { background: var(--badge-med-bg);  color: var(--badge-med-fg);  }
.badge.hard   { background: var(--badge-hard-bg); color: var(--badge-hard-fg); }
.badge.cat {
    background: var(--bg-raised);
    border: 1px solid var(--border-default);
    color: var(--text-secondary);
}
.badge.company {
    background: rgba(255,140,5,.12);
    color: var(--accent);
    border: 1px solid rgba(255,140,5,.25);
}

.card-preview {
    font-size: 13.5px;
    color: var(--text-secondary);
    line-height: 1.6;
}

.card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-secondary);
    gap: 8px;
}

.view-count { display: flex; align-items: center; gap: 4px; }

.card-actions {
    display: flex;
    gap: 8px;
}

.read-btn {
    flex: 1;
    padding: 9px;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    color: #fff;
    transition: opacity .15s;
}
.read-btn:hover { opacity: .9; }

.gfg-btn {
    padding: 9px 14px;
    border: 1.5px solid var(--border-default);
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    background: transparent;
    color: var(--text-secondary);
    text-decoration: none;
    display: flex; align-items: center; gap: 4px;
    transition: border-color .15s, color .15s;
}
.gfg-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ══ EXPANDED CONTENT PANEL ═══════════════════ */
.expand-panel {
    display: none;
    margin-top: 4px;
    border-top: 1px solid var(--border-default);
    padding-top: 14px;
    font-size: 13.5px;
    color: var(--text-primary);
    line-height: 1.7;
    max-height: 420px;
    overflow-y: auto;
}
.expand-panel.open { display: block; }
.expand-panel h1, .expand-panel h2, .expand-panel h3,
.expand-panel h4, .expand-panel h5, .expand-panel h6 {
    font-size: 15px;
    margin: 12px 0 6px;
    color: var(--text-primary);
}
.expand-panel p  { margin-bottom: 8px; }
.expand-panel ul, .expand-panel ol { padding-left: 20px; margin-bottom: 8px; }
.expand-panel pre, .expand-panel code {
    background: var(--bg-raised);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12.5px;
    overflow-x: auto;
}
.expand-panel pre { padding: 10px; display: block; margin: 8px 0; }

/* ══ SKELETON ═════════════════════════════════ */
.skeleton-card {
    background: var(--bg-card);
    border: 1.5px solid var(--border-default);
    border-radius: var(--radius);
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.skel {
    border-radius: 6px;
    background: linear-gradient(90deg,
        var(--skeleton-base) 25%,
        var(--skeleton-shine) 50%,
        var(--skeleton-base) 75%);
    background-size: 400% 100%;
    animation: shimmer 1.5s infinite;
}

@keyframes shimmer {
    0%  { background-position: 100% 50%; }
    100%{ background-position: -100% 50%; }
}

/* ══ EMPTY STATE ══════════════════════════════ */
.empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 64px 24px;
}
.empty-state .empty-icon { font-size: 56px; margin-bottom: 16px; }
.empty-state h3 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.empty-state p  { color: var(--text-secondary); font-size: 15px; max-width: 420px; margin: 0 auto 20px; }

/* ══ TOAST ════════════════════════════════════ */
.toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--text-primary);
    color: var(--bg-page);
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 4px 24px rgba(0,0,0,.25);
    z-index: 9999;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity .25s, transform .25s;
    pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ══ RESPONSIVE ═══════════════════════════════ */
@media (max-width: 768px) {
    .navbar    { padding: 14px 20px; }
    .page-header, .search-wrap, .trending-section,
    .tabs-section, .results-header, .topic-grid { padding-left: 16px; padding-right: 16px; }
    .topic-grid { grid-template-columns: 1fr; }
    .page-header h1 { font-size: 26px; }
}
</style>
</head>
<body>

<!-- ═══ NAVBAR ════════════ -->
<div class="navbar">
    <div class="nav-brand">Career<span>Pilot</span></div>
    <div class="nav-right">
        <button class="nav-btn outline" onclick="window.location.href='dashboard.html'">Dashboard</button>
        <button class="nav-btn outline" onclick="window.location.href='profile.html'">Profile</button>
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
    </div>
</div>

<!-- ═══ PAGE HEADER ═══════ -->
<div class="page-header">
    <h1>Internship <span>Prep Hub</span></h1>
    <p>Company-wise interview questions sourced from GeeksForGeeks — search, filter, and study smart.</p>
</div>

<!-- ═══ SEARCH ════════════ -->
<div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input
        class="search-input"
        id="searchInput"
        type="text"
        placeholder="Search topics, keywords, questions…"
        autocomplete="off"
    >
</div>

<!-- ═══ TRENDING ══════════ -->
<div class="trending-section">
    <h3>🔥 Trending Topics</h3>
    <div class="trending-pills" id="trendingPills">
        <!-- filled by JS -->
    </div>
</div>

<!-- ═══ COMPANY TABS ══════ -->
<div class="tabs-section">
    <div class="tabs-label">Filter by Company</div>
    <div class="tabs-row" id="companyTabs">
        <button class="tab-btn active" data-company="">All Companies</button>
        <button class="tab-btn" data-company="AMAZON">Amazon</button>
        <button class="tab-btn" data-company="GOOGLE">Google</button>
        <button class="tab-btn" data-company="MICROSOFT">Microsoft</button>
        <button class="tab-btn" data-company="FLIPKART">Flipkart</button>
        <button class="tab-btn" data-company="INFOSYS">Infosys</button>
        <button class="tab-btn" data-company="TCS">TCS</button>
        <button class="tab-btn" data-company="WIPRO">Wipro</button>
        <button class="tab-btn" data-company="ACCENTURE">Accenture</button>
        <button class="tab-btn" data-company="COGNIZANT">Cognizant</button>
        <button class="tab-btn" data-company="CAPGEMINI">Capgemini</button>
    </div>

    <div class="tabs-label" style="margin-top:8px">Filter by Category</div>
    <div class="cat-row" id="categoryTabs">
        <button class="cat-btn active" data-category="">All</button>
        <button class="cat-btn" data-category="JAVA">Java</button>
        <button class="cat-btn" data-category="DSA">DSA</button>
        <button class="cat-btn" data-category="DBMS">DBMS</button>
        <button class="cat-btn" data-category="OS">OS</button>
        <button class="cat-btn" data-category="CN">CN</button>
        <button class="cat-btn" data-category="APTITUDE">Aptitude</button>
        <button class="cat-btn" data-category="HR">HR</button>
    </div>
</div>

<!-- ═══ RESULTS HEADER ════ -->
<div class="results-header">
    <span class="results-count" id="resultsCount">Loading…</span>
    <button class="scrape-btn" id="scrapeBtn" onclick="triggerScrape()">
        ↻ Fetch Latest from GFG
    </button>
</div>

<!-- ═══ TOPIC GRID ════════ -->
<div class="topic-grid" id="topicGrid">
    <!-- skeleton placeholders -->
    <div class="skeleton-card">
        <div class="skel" style="height:18px;width:70%"></div>
        <div class="skel" style="height:13px;width:40%"></div>
        <div class="skel" style="height:60px"></div>
        <div class="skel" style="height:36px;width:60%"></div>
    </div>
    <div class="skeleton-card">
        <div class="skel" style="height:18px;width:80%"></div>
        <div class="skel" style="height:13px;width:35%"></div>
        <div class="skel" style="height:80px"></div>
        <div class="skel" style="height:36px;width:55%"></div>
    </div>
    <div class="skeleton-card">
        <div class="skel" style="height:18px;width:65%"></div>
        <div class="skel" style="height:13px;width:45%"></div>
        <div class="skel" style="height:70px"></div>
        <div class="skel" style="height:36px;width:60%"></div>
    </div>
</div>

<!-- ═══ TOAST ══════════════ -->
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════
   Config
   ═══════════════════════════════════════════════════ */
const API = 'http://localhost:8089/api/prep/topics';

const userEmail = localStorage.getItem('userEmail');
if (!userEmail) window.location.href = 'user_login.html';

/* ═══════════════════════════════════════════════════
   State
   ═══════════════════════════════════════════════════ */
let selectedCompany   = '';
let selectedCategory  = '';
let searchDebounce    = null;
let expandedCardId    = null;

/* ═══════════════════════════════════════════════════
   Theme
   ═══════════════════════════════════════════════════ */
function initTheme() {
    const saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    document.getElementById('themeToggle').textContent = saved === 'dark' ? '☀️' : '🌙';
}

function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme') || 'light';
    const next    = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    document.getElementById('themeToggle').textContent = next === 'dark' ? '☀️' : '🌙';
}

/* ═══════════════════════════════════════════════════
   Toast
   ═══════════════════════════════════════════════════ */
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

/* ═══════════════════════════════════════════════════
   Data fetching
   ═══════════════════════════════════════════════════ */
async function fetchTopics({ category = '', company = '' } = {}) {
    const params = new URLSearchParams();
    if (category) params.set('category', category);
    if (company)  params.set('company',  company);
    const url = params.toString() ? `${API}?${params}` : API;
    const res  = await fetch(url);
    const json = await res.json();
    return json.data || [];
}

async function fetchSearch(q) {
    const res  = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
    const json = await res.json();
    return json.data || [];
}

async function fetchTrending() {
    const res  = await fetch(`${API}/trending?limit=8`);
    const json = await res.json();
    return json.data || [];
}

async function fetchById(id) {
    const res  = await fetch(`${API}/${id}`);
    const json = await res.json();
    return json.data || null;
}

/* ═══════════════════════════════════════════════════
   Render helpers
   ═══════════════════════════════════════════════════ */
function diffBadge(d) {
    if (!d) return '';
    const cls = d === 'EASY' ? 'easy' : d === 'MEDIUM' ? 'medium' : 'hard';
    return `<span class="badge ${cls}">${d}</span>`;
}

function companyLabel(c) {
    return c && c !== 'GENERAL'
        ? `<span class="badge company">${c}</span>`
        : '';
}

function catBadge(c) {
    return c ? `<span class="badge cat">${c}</span>` : '';
}

function renderCard(topic) {
    const isOpen = expandedCardId === topic.id;
    return `
    <div class="topic-card" id="card-${topic.id}" onclick="handleCardClick(event, ${topic.id})">
        <div class="card-top">
            <div class="card-title">${escHtml(topic.title)}</div>
            <div class="card-badges">
                ${companyLabel(topic.company)}
                ${catBadge(topic.category)}
                ${diffBadge(topic.difficulty)}
            </div>
        </div>

        <div class="card-preview">${escHtml(topic.contentPreview || 'Click to expand full content.')}</div>

        <div class="card-meta">
            <span class="view-count">👁 ${topic.timesViewed || 0} views</span>
            ${topic.scrapedAt ? `<span>📅 ${fmtDate(topic.scrapedAt)}</span>` : ''}
        </div>

        <div class="expand-panel ${isOpen ? 'open' : ''}" id="expand-${topic.id}">
            <p><em>Loading full content…</em></p>
        </div>

        <div class="card-actions" onclick="event.stopPropagation()">
            <button class="read-btn" onclick="toggleExpand(${topic.id})">
                ${isOpen ? '▲ Collapse' : '▼ Read More'}
            </button>
            ${topic.sourceUrl
                ? `<a class="gfg-btn" href="${escHtml(topic.sourceUrl)}" target="_blank" rel="noopener noreferrer">GFG ↗</a>`
                : ''}
        </div>
    </div>`;
}

function fmtDate(dt) {
    if (!dt) return '';
    return new Date(dt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
}

function escHtml(s) {
    return (s || '')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════════════
   Expand / collapse a card with full content fetch
   ═══════════════════════════════════════════════════ */
async function toggleExpand(topicId) {
    const panel = document.getElementById(`expand-${topicId}`);
    const card  = document.getElementById(`card-${topicId}`);
    if (!panel || !card) return;

    const isNowOpen = panel.classList.contains('open');
    if (isNowOpen) {
        panel.classList.remove('open');
        card.querySelector('.read-btn').textContent = '▼ Read More';
        expandedCardId = null;
        return;
    }

    panel.classList.add('open');
    card.querySelector('.read-btn').textContent = '▲ Collapse';
    expandedCardId = topicId;

    // Load full content only once
    if (panel.dataset.loaded !== 'true') {
        panel.innerHTML = '<p><em>Loading…</em></p>';
        try {
            const topic = await fetchById(topicId);
            if (topic && topic.content) {
                panel.innerHTML = topic.content;
            } else {
                panel.innerHTML = '<p>No detailed content available. Visit the GFG link above.</p>';
            }
            panel.dataset.loaded = 'true';
        } catch (e) {
            panel.innerHTML = '<p>Failed to load content.</p>';
        }
    }
}

function handleCardClick(event, topicId) {
    // If click was on a button/link, don't toggle
    if (event.target.closest('button, a')) return;
    toggleExpand(topicId);
}

/* ═══════════════════════════════════════════════════
   Main render
   ═══════════════════════════════════════════════════ */
function renderGrid(topics) {
    const grid = document.getElementById('topicGrid');
    const count = document.getElementById('resultsCount');
    if (!topics || topics.length === 0) {
        grid.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">📭</div>
                <h3>No topics found</h3>
                <p>Try a different filter or click "Fetch Latest from GFG" to populate topics.</p>
                <button class="nav-btn" onclick="triggerScrape()">↻ Fetch from GFG</button>
            </div>`;
        count.textContent = '0 topics';
        return;
    }
    count.textContent = `${topics.length} topic${topics.length !== 1 ? 's' : ''}`;
    grid.innerHTML = topics.map(renderCard).join('');
}

/* ═══════════════════════════════════════════════════
   Trending pills
   ═══════════════════════════════════════════════════ */
async function loadTrending() {
    const trending = await fetchTrending().catch(() => []);
    const pills    = document.getElementById('trendingPills');
    if (trending.length === 0) {
        pills.innerHTML = '<span style="color:var(--text-secondary);font-size:13px">No trending data yet</span>';
        return;
    }
    pills.innerHTML = trending.map(t =>
        `<span class="pill" onclick="pillSearch('${escHtml(t.title)}')">${escHtml(t.title)}</span>`
    ).join('');
}

function pillSearch(title) {
    document.getElementById('searchInput').value = title;
    selectedCompany  = '';
    selectedCategory = '';
    setActiveTab('companyTabs', '');
    setActiveTab('categoryTabs', '');
    loadTopics({ q: title });
}

/* ═══════════════════════════════════════════════════
   Load topics
   ═══════════════════════════════════════════════════ */
async function loadTopics({ category, company, q } = {}) {
    try {
        let data;
        if (q && q.trim()) {
            data = await fetchSearch(q.trim());
        } else {
            data = await fetchTopics({ category, company });
        }
        renderGrid(data);
    } catch (e) {
        console.error(e);
        document.getElementById('topicGrid').innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">⚠️</div>
                <h3>Backend not reachable</h3>
                <p>Make sure your Spring Boot server is running on port 8089, then click Fetch to populate.</p>
                <button class="nav-btn" onclick="triggerScrape()">↻ Fetch from GFG</button>
            </div>`;
        document.getElementById('resultsCount').textContent = '–';
    }
}

/* ═══════════════════════════════════════════════════
   Scrape trigger
   ═══════════════════════════════════════════════════ */
async function triggerScrape() {
    const btn = document.getElementById('scrapeBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Scraping GFG…';
    showToast('Scraping GeeksForGeeks — this may take ~60 s…');
    try {
        const res  = await fetch(`${API}/scrape`, { method: 'POST' });
        const json = await res.json();
        showToast(json.data || 'Scrape complete!');
        await loadTopics({ category: selectedCategory, company: selectedCompany });
        await loadTrending();
    } catch (e) {
        showToast('Scrape failed — check server logs');
    } finally {
        btn.disabled = false;
        btn.textContent = '↻ Fetch Latest from GFG';
    }
}

/* ═══════════════════════════════════════════════════
   Tab helpers
   ═══════════════════════════════════════════════════ */
function setActiveTab(containerId, value) {
    document.querySelectorAll(`#${containerId} button`).forEach(btn => {
        const btnVal = btn.dataset.company !== undefined ? btn.dataset.company : btn.dataset.category;
        btn.classList.toggle('active', btnVal === value);
    });
}

document.getElementById('companyTabs').addEventListener('click', e => {
    const btn = e.target.closest('.tab-btn');
    if (!btn) return;
    selectedCompany = btn.dataset.company;
    setActiveTab('companyTabs', selectedCompany);
    document.getElementById('searchInput').value = '';
    loadTopics({ category: selectedCategory, company: selectedCompany });
});

document.getElementById('categoryTabs').addEventListener('click', e => {
    const btn = e.target.closest('.cat-btn');
    if (!btn) return;
    selectedCategory = btn.dataset.category;
    setActiveTab('categoryTabs', selectedCategory);
    document.getElementById('searchInput').value = '';
    loadTopics({ category: selectedCategory, company: selectedCompany });
});

/* ═══════════════════════════════════════════════════
   Debounced search
   ═══════════════════════════════════════════════════ */
document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(searchDebounce);
    const q = e.target.value.trim();
    searchDebounce = setTimeout(() => {
        if (q) {
            setActiveTab('companyTabs',   '');
            setActiveTab('categoryTabs',  '');
            selectedCompany  = '';
            selectedCategory = '';
            loadTopics({ q });
        } else {
            loadTopics({ category: selectedCategory, company: selectedCompany });
        }
    }, 400);
});

/* ═══════════════════════════════════════════════════
   Boot
   ═══════════════════════════════════════════════════ */
initTheme();
Promise.all([
    loadTopics(),
    loadTrending()
]);
</script>
</body>
</html>
