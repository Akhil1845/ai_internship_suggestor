<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authentication - internship_ai</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    
    .container {
      text-align: center;
      padding: 40px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }
    
    p {
      font-size: 16px;
      opacity: 0.9;
    }
    
    .success {
      color: #4ade80;
    }
    
    .error {
      color: #f87171;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <h1 id="message">Authenticating with Google...</h1>
    <p id="details">Please wait while we log you in.</p>
  </div>

  <script>
    // Get URL parameters
    const params = new URLSearchParams(window.location.search);
    const success = params.get('success');
    const userId = params.get('userId');
    const email = params.get('email');
    const name = params.get('name');
    const error = params.get('error');

    const spinner = document.getElementById('spinner');
    const messageEl = document.getElementById('message');
    const detailsEl = document.getElementById('details');

    if (success === 'true' && userId && email) {
      // Success - Store user data and redirect
      spinner.style.display = 'none';
      messageEl.textContent = 'Authentication Successful!';
      messageEl.className = 'success';
      detailsEl.textContent = `Welcome back, ${name || email}`;

      // Store user data in localStorage
      localStorage.setItem('userEmail', email);
      localStorage.setItem('studentId', userId);
      if (name) localStorage.setItem('userName', name);

      // Redirect to dashboard after 2 seconds
      setTimeout(() => {
        window.location.href = '/dashboard.html';
      }, 2000);

    } else if (success === 'false') {
      // Error
      spinner.style.display = 'none';
      messageEl.textContent = 'Authentication Failed';
      messageEl.className = 'error';
      detailsEl.textContent = error || 'Something went wrong. Please try again.';

      // Redirect back to login after 3 seconds
      setTimeout(() => {
        window.location.href = '/user_login.html';
      }, 3000);

    } else {
      // Unknown state - redirect to login
      spinner.style.display = 'none';
      messageEl.textContent = 'Invalid Response';
      messageEl.className = 'error';
      detailsEl.textContent = 'Redirecting to login...';

      setTimeout(() => {
        window.location.href = '/user_login.html';
      }, 2000);
    }
  </script>
</body>
</html>
