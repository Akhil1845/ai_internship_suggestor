<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authentication - internship_ai</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 460px;
      text-align: center;
      padding: 28px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }
    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid rgba(255, 255, 255, 0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p { font-size: 14px; opacity: 0.92; }
    .success { color: #4ade80; }
    .error { color: #fca5a5; }

    .setup-form {
      display: none;
      margin-top: 18px;
      text-align: left;
    }
    .setup-form.visible { display: block; }
    .field { margin-bottom: 12px; }
    .field label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      opacity: 0.95;
    }
    .field input {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(0, 0, 0, 0.2);
      color: #fff;
      border-radius: 10px;
      padding: 11px 12px;
      outline: none;
    }
    .field input::placeholder { color: rgba(255, 255, 255, 0.7); }
    .field-error {
      min-height: 18px;
      font-size: 12px;
      color: #fecaca;
      margin-top: 4px;
    }
    .btn {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 12px;
      font-weight: 700;
      cursor: pointer;
      background: #f59e0b;
      color: #111827;
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="status-box">
      <div class="spinner" id="spinner"></div>
      <h1 id="message">Authenticating with Google...</h1>
      <p id="details">Please wait while we process your account.</p>
    </div>

    <form id="setup-form" class="setup-form" novalidate>
      <h1>Complete Signup</h1>
      <p style="margin-top: 4px; margin-bottom: 12px;">Set a username and password for future login.</p>

      <div class="field">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="username" autocomplete="username">
        <div class="field-error" id="username-err"></div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Minimum 8 characters" autocomplete="new-password">
        <div class="field-error" id="password-err"></div>
      </div>

      <div class="field">
        <label for="confirm">Confirm Password</label>
        <input id="confirm" type="password" placeholder="Repeat password" autocomplete="new-password">
        <div class="field-error" id="confirm-err"></div>
      </div>

      <button class="btn" id="setup-btn" type="submit">Save and Continue</button>
    </form>
  </div>

  <script>
    const AUTH_BASE = 'http://localhost:8089/api/auth';

    const params = new URLSearchParams(window.location.search);
    const setup = params.get('setup') === 'true';
    const success = params.get('success');
    const userId = params.get('userId');
    const email = params.get('email');
    const name = params.get('name');
    const error = params.get('error');

    const spinner = document.getElementById('spinner');
    const messageEl = document.getElementById('message');
    const detailsEl = document.getElementById('details');
    const setupForm = document.getElementById('setup-form');

    function redirectToLogin(delayMs) {
      setTimeout(() => { window.location.href = '/user_login.html'; }, delayMs);
    }

    function redirectToDashboard(delayMs) {
      setTimeout(() => { window.location.href = '/dashboard.html'; }, delayMs);
    }

    function saveSession() {
      if (email) localStorage.setItem('userEmail', email);
      if (userId) localStorage.setItem('studentId', userId);
      if (name) localStorage.setItem('userName', name);
    }

    function showSetupForm() {
      spinner.style.display = 'none';
      messageEl.textContent = 'Google account verified';
      detailsEl.textContent = 'Complete your signup details below.';
      setupForm.classList.add('visible');
    }

    if (setup && userId && email) {
      showSetupForm();
    } else if (success === 'true' && userId && email) {
      spinner.style.display = 'none';
      messageEl.textContent = 'Authentication Successful!';
      messageEl.className = 'success';
      detailsEl.textContent = 'Redirecting to dashboard...';
      saveSession();
      redirectToDashboard(1200);
    } else if (success === 'false') {
      spinner.style.display = 'none';
      messageEl.textContent = 'Authentication Failed';
      messageEl.className = 'error';
      detailsEl.textContent = error || 'Something went wrong. Redirecting to login...';
      redirectToLogin(2200);
    } else {
      spinner.style.display = 'none';
      messageEl.textContent = 'Invalid OAuth response';
      messageEl.className = 'error';
      detailsEl.textContent = 'Redirecting to login...';
      redirectToLogin(1800);
    }

    setupForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const usernameEl = document.getElementById('username');
      const passwordEl = document.getElementById('password');
      const confirmEl = document.getElementById('confirm');
      const btn = document.getElementById('setup-btn');

      const usernameErr = document.getElementById('username-err');
      const passwordErr = document.getElementById('password-err');
      const confirmErr = document.getElementById('confirm-err');

      usernameErr.textContent = '';
      passwordErr.textContent = '';
      confirmErr.textContent = '';

      const username = usernameEl.value.trim();
      const password = passwordEl.value;
      const confirm = confirmEl.value;

      let valid = true;
      if (username.length < 3) {
        usernameErr.textContent = 'Username must be at least 3 characters';
        valid = false;
      }
      if (password.length < 8) {
        passwordErr.textContent = 'Password must be at least 8 characters';
        valid = false;
      }
      if (confirm !== password) {
        confirmErr.textContent = 'Passwords do not match';
        valid = false;
      }
      if (!valid) return;

      btn.disabled = true;
      btn.textContent = 'Saving...';

      try {
        const response = await fetch(`${AUTH_BASE}/google/complete-signup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId,
            username,
            password
          })
        });

        const result = await response.text();
        if (!response.ok) {
          if (result.toLowerCase().includes('username')) {
            usernameErr.textContent = result;
          } else if (result.toLowerCase().includes('password')) {
            passwordErr.textContent = result;
          } else {
            confirmErr.textContent = result;
          }
          return;
        }

        messageEl.textContent = 'Signup Completed!';
        messageEl.className = 'success';
        detailsEl.textContent = 'Your username and password were saved.';
        setupForm.classList.remove('visible');

        saveSession();
        localStorage.setItem('userName', username);

        redirectToDashboard(1200);
      } catch {
        confirmErr.textContent = 'Could not connect to server. Try again.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Save and Continue';
      }
    });
  </script>
</body>
</html>
