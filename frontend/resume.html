<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResumeForge — Professional Resume Builder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@400;600;700&family=Space+Mono:wght@400;700&family=Crimson+Pro:wght@300;400;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link rel="stylesheet" href="resume.css">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">
    <div class="logo-icon">📄</div>
    Resume<span>Forge</span>
  </div>
  <div class="topbar-actions">
    <button class="btn btn-ghost" onclick="location.href='templates.html'" title="Choose template">🎨 Templates</button>
    <button class="btn btn-ghost" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
    <button class="btn btn-ghost" onclick="saveResume()">💾 Save</button>
    <button class="btn btn-outline" onclick="clearStorage()">↺ Reset</button>
    <button class="btn btn-success" onclick="printResume()">🖨 Print</button>
    <button class="btn btn-primary" onclick="downloadPDF()">⬇ PDF</button>
  </div>
</div>

<div class="app-layout">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-tabs">
      <div class="sidebar-tab active" onclick="switchTab('sections',this)">Sections</div>
      <div class="sidebar-tab" onclick="switchTab('style',this)">Style</div>
    </div>

    <!-- SECTIONS -->
    <div class="sidebar-panel active" id="panel-sections">
      <div id="sec-list" class="sec-list"></div>
    </div>

    <!-- STYLE -->
    <div class="sidebar-panel" id="panel-style">

      <!-- Colors -->
      <div class="ctrl-group">
        <div class="ctrl-group-hd open" onclick="tg(this)">Colors <span class="arrow">▲</span></div>
        <div class="ctrl-group-body">
          <div class="ctrl-inline"><label>Primary</label><input class="ctrl-color" type="color" value="#2563eb" oninput="sv('--r-primary',this.value)"></div>
          <div class="ctrl-inline"><label>Secondary</label><input class="ctrl-color" type="color" value="#7c3aed" oninput="sv('--r-secondary',this.value)"></div>
          <div class="ctrl-inline"><label>Background</label><input class="ctrl-color" type="color" value="#ffffff" oninput="sv('--r-bg',this.value)"></div>
          <div class="ctrl-inline"><label>Section Titles</label><input class="ctrl-color" type="color" value="#0f172a" oninput="sv('--r-section-title',this.value)"></div>
        </div>
      </div>

      <!-- Typography -->
      <div class="ctrl-group">
        <div class="ctrl-group-hd open" onclick="tg(this)">Typography <span class="arrow">▲</span></div>
        <div class="ctrl-group-body">
          <div class="ctrl-row">
            <label class="ctrl-lbl">Font Family</label>
            <select class="ctrl-select" onchange="sv('--r-font',this.value)">
              <option value="'DM Sans', sans-serif">DM Sans</option>
              <option value="'Playfair Display', serif">Playfair Display</option>
              <option value="'Space Mono', monospace">Space Mono</option>
              <option value="'Crimson Pro', serif">Crimson Pro</option>
              <option value="'Syne', sans-serif">Syne</option>
              <option value="Georgia, serif">Georgia</option>
              <option value="'Courier New', monospace">Courier New</option>
            </select>
          </div>
          <div class="ctrl-row">
            <div class="ctrl-inline"><label>Body Size</label><span class="range-val" id="lv-fs">13px</span></div>
            <div class="ctrl-range-wrap"><input type="range" min="10" max="18" value="13" oninput="spx('--r-font-size',this.value,'lv-fs')"></div>
          </div>
          <div class="ctrl-row">
            <div class="ctrl-inline"><label>Name Size</label><span class="range-val" id="lv-ts">26px</span></div>
            <div class="ctrl-range-wrap"><input type="range" min="16" max="52" value="26" oninput="spx('--r-title-size',this.value,'lv-ts')"></div>
          </div>
          <div class="ctrl-row">
            <div class="ctrl-inline"><label>Line Height</label><span class="range-val" id="lv-lh">1.6</span></div>
            <div class="ctrl-range-wrap"><input type="range" min="10" max="28" value="16" oninput="slh(this.value)"></div>
          </div>
          <div class="ctrl-row">
            <div class="ctrl-inline"><label>Letter Spacing</label><span class="range-val" id="lv-ls">0em</span></div>
            <div class="ctrl-range-wrap"><input type="range" min="-5" max="20" value="0" oninput="sem('--r-letter-spacing',this.value,'lv-ls')"></div>
          </div>
          <div class="ctrl-row">
            <div class="ctrl-inline"><label>Word Spacing</label><span class="range-val" id="lv-ws">0em</span></div>
            <div class="ctrl-range-wrap"><input type="range" min="-5" max="20" value="0" oninput="sem('--r-word-spacing',this.value,'lv-ws')"></div>
          </div>
        </div>
      </div>

      <!-- Layout -->
      <div class="ctrl-group">
        <div class="ctrl-group-hd open" onclick="tg(this)">Layout <span class="arrow">▲</span></div>
        <div class="ctrl-group-body">
          <div class="ctrl-row">
            <div class="ctrl-inline"><label>Section Gap</label><span class="range-val" id="lv-gap">16px</span></div>
            <div class="ctrl-range-wrap"><input type="range" min="4" max="48" value="16" oninput="spx('--r-gap',this.value,'lv-gap')"></div>
          </div>
          <div class="ctrl-row">
            <div class="ctrl-inline"><label>Section Padding</label><span class="range-val" id="lv-pad">14px</span></div>
            <div class="ctrl-range-wrap"><input type="range" min="0" max="32" value="14" oninput="spad(this.value)"></div>
          </div>
          <div class="ctrl-row">
            <div class="ctrl-inline"><label>Title Margin</label><span class="range-val" id="lv-tm">10px</span></div>
            <div class="ctrl-range-wrap"><input type="range" min="0" max="28" value="10" oninput="spx('--r-title-margin',this.value,'lv-tm')"></div>
          </div>
          <div class="ctrl-row">
            <div class="ctrl-inline"><label>Border Radius</label><span class="range-val" id="lv-br">6px</span></div>
            <div class="ctrl-range-wrap"><input type="range" min="0" max="24" value="6" oninput="spx('--r-border-radius',this.value,'lv-br')"></div>
          </div>
          <div class="toggle-row">
            <label class="lbl">Section Borders</label>
            <label class="sw"><input type="checkbox" onchange="sv('--r-border', this.checked ? '1px solid #e2e8f0' : 'none')"><span class="sw-track"></span></label>
          </div>
          <div class="toggle-row">
            <label class="lbl">Section Shadows</label>
            <label class="sw"><input type="checkbox" onchange="sv('--r-shadow', this.checked ? '0 2px 10px rgba(0,0,0,0.06)' : 'none')"><span class="sw-track"></span></label>
          </div>
        </div>
      </div>

    </div><!-- /style panel -->
  </div><!-- /sidebar -->

  <!-- MAIN AREA -->
  <div class="main-area" id="main-area">
    <div class="resume-scale-wrap" id="scale-wrap">
      <div class="resume-wrapper" id="resume"></div>
    </div>
  </div>

</div>

<!-- NOTIFICATION -->
<div class="notif" id="notif"></div>

<!-- LOADER -->
<div class="loader-ov" id="loader">
  <div class="spinner"></div>
  <div class="loader-txt">Generating PDF…</div>
</div>

<script>
/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
const DEFAULT = {
  template: 'modern',
  name: 'Alexandra Chen',
  jobTitle: 'Senior Product Designer',
  email: 'alex.chen@email.com',
  phone: '+1 (555) 012-3456',
  location: 'San Francisco, CA',
  linkedin: 'linkedin.com/in/alexchen',
  website: 'alexchen.design',
  photo: '',
  summary: 'Passionate designer with 7+ years of experience crafting intuitive digital products. I bridge the gap between business goals and user needs through research-driven design and a deep understanding of human psychology.',
  skills: ['Figma', 'UX Research', 'Prototyping', 'Design Systems', 'Adobe XD', 'Usability Testing', 'HTML/CSS', 'Motion Design'],
  experience: [
    { role: 'Senior Product Designer', company: 'Stripe', location: 'San Francisco, CA', date: '2021 – Present', desc: 'Led end-to-end design for core payment flows, increasing conversion by 23%. Collaborated with cross-functional teams to ship 12 major product features.' },
    { role: 'Product Designer', company: 'Airbnb', location: 'Remote', date: '2019 – 2021', desc: 'Redesigned host onboarding experience, reducing drop-off by 40%. Created and maintained a component library used by 30+ designers globally.' },
    { role: 'UI/UX Designer', company: 'Freelance', location: 'New York, NY', date: '2017 – 2019', desc: 'Delivered design solutions for 25+ startups across fintech, health, and e-commerce verticals.' }
  ],
  education: [
    { degree: 'B.F.A. Interaction Design', school: 'California College of the Arts', date: '2013 – 2017', desc: 'Graduated with Honors. Focus on Human-Computer Interaction and Design Research.' }
  ],
  projects: [
    { name: 'DesignOS — Open Source Design Toolkit', tech: 'Figma · React', desc: 'Open-source design system with 200+ components, adopted by 500+ teams globally.' }
  ],
  certifications: ['Google UX Design Certificate', 'Certified Scrum Product Owner (CSPO)', 'AWS Cloud Practitioner'],
  achievements: ['Speaker at Config 2023 — "Designing at Scale"', 'Adobe Design Achievement Award 2020', 'Product Designer of the Year — Stripe 2022'],
  languages: [
    { lang: 'English', level: 'Native' },
    { lang: 'Mandarin', level: 'Fluent' },
    { lang: 'French', level: 'Intermediate' }
  ],
  interests: ['User Research', 'Type Design', 'Photography', 'Rock Climbing', 'Science Fiction'],
  sections: [
    { id:'photo', label:'Photo', visible:true },
    { id:'summary', label:'Summary', visible:true },
    { id:'experience', label:'Experience', visible:true },
    { id:'education', label:'Education', visible:true },
    { id:'skills', label:'Skills', visible:true },
    { id:'projects', label:'Projects', visible:true },
    { id:'certifications', label:'Certifications', visible:true },
    { id:'achievements', label:'Achievements', visible:true },
    { id:'languages', label:'Languages', visible:true },
    { id:'interests', label:'Interests', visible:true }
  ]
};

let S = JSON.parse(JSON.stringify(DEFAULT));

/* ════════════════════════════════════════
   RENDER RESUME
════════════════════════════════════════ */
function render() {
  const el = document.getElementById('resume');
  if (!el) {
    console.error('resume element not found');
    return;
  }
  el.className = `resume-wrapper tpl-${S.template}`;
  el.innerHTML = buildResume();
  setupPhotoClick();
  scaleResume();
}

function buildResume() {
  const s = S, t = S.template;
  const photo = s.photo
    ? `<img src="${s.photo}" alt="Photo">`
    : `<div class="photo-ph">👤</div>`;

  const showPhoto = !s.sections || !s.sections.some(sec => sec.id === 'photo')
    ? true
    : !!s.sections.find(sec => sec.id === 'photo')?.visible;

  const visibleSections = (predicate = null) => {
    const base = S.sections.filter(sec => sec.visible && sec.id !== 'photo');
    return typeof predicate === 'function' ? base.filter(predicate) : base;
  };

  const renderSections = (predicate = null) => visibleSections(predicate).map(sec => secHTML(sec)).join('');
  const photoBlock = (inlineStyle) => showPhoto
    ? `<div class="r-photo" style="${inlineStyle}">${photo}</div>`
    : '';

  const contacts = [
    s.email    && `<span class="r-contact-item" contenteditable="true">📧 ${s.email}</span>`,
    s.phone    && `<span class="r-contact-item" contenteditable="true">📞 ${s.phone}</span>`,
    s.location && `<span class="r-contact-item" contenteditable="true">📍 ${s.location}</span>`,
    s.linkedin && `<span class="r-contact-item" contenteditable="true">🔗 ${s.linkedin}</span>`,
    s.website  && `<span class="r-contact-item" contenteditable="true">🌐 ${s.website}</span>`
  ].filter(Boolean).join('');

  if (t === 'modern') {
    const leftIDs = ['skills','languages','certifications','interests'];
    const left  = renderSections(sec => leftIDs.includes(sec.id));
    const right = renderSections(sec => !leftIDs.includes(sec.id));
    return `
      <div class="r-hd">
        ${photoBlock('width:80px;height:80px;border-radius:50%;')}
        <div>
          <div class="r-name" contenteditable="true">${s.name}</div>
          <div class="r-jobtitle" contenteditable="true">${s.jobTitle}</div>
          <div class="r-contact">${contacts}</div>
        </div>
      </div>
      <div class="r-body">
        <div class="r-col-l">${left}</div>
        <div class="r-col-r">${right}</div>
      </div>`;
  }
  if (t === 'classic') {
    return `
      <div class="r-hd">
        ${photoBlock('width:82px;height:82px;border-radius:50%;')}
        <div class="r-name" contenteditable="true">${s.name}</div>
        <div class="r-jobtitle" contenteditable="true">${s.jobTitle}</div>
        <div class="r-contact">${contacts}</div>
      </div>
      <div class="r-body">${renderSections()}</div>`;
  }
  if (t === 'minimal') {
    return `
      <div class="r-hd">
        ${photoBlock('width:64px;height:64px;border-radius:4px;')}
        <div>
          <div class="r-name" contenteditable="true">${s.name}</div>
          <div class="r-jobtitle" contenteditable="true">${s.jobTitle}</div>
          <div class="r-contact">${contacts}</div>
        </div>
      </div>
      <div class="r-body">${renderSections()}</div>`;
  }
  if (t === 'creative') {
    const sideIDs = ['skills','languages','certifications','interests'];
    const sideHTML = renderSections(sec => sideIDs.includes(sec.id));
    const mainHTML = renderSections(sec => !sideIDs.includes(sec.id));
    return `
      <div class="r-sidebar">
        ${photoBlock('width:80px;height:80px;border-radius:50%;')}
        <div class="r-name" contenteditable="true">${s.name}</div>
        <div class="r-jobtitle" contenteditable="true">${s.jobTitle}</div>
        <div class="sec-title" style="margin-top:12px;">Contact</div>
        <div class="r-contact" style="flex-direction:column;gap:5px;">${contacts}</div>
        ${sideHTML}
      </div>
      <div class="r-main">${mainHTML}</div>`;
  }
  if (t === 'professional') {
    const leftIDs = ['skills','languages','certifications','interests'];
    const left  = renderSections(sec => leftIDs.includes(sec.id));
    const right = renderSections(sec => !leftIDs.includes(sec.id));
    return `
      <div class="r-hd">
        ${photoBlock('width:72px;height:72px;border-radius:8px;')}
        <div>
          <div class="r-name" contenteditable="true">${s.name}</div>
          <div class="r-jobtitle" contenteditable="true">${s.jobTitle}</div>
          <div class="r-contact">${contacts}</div>
        </div>
      </div>
      <div class="r-body">
        <div class="r-col-l">${left}</div>
        <div class="r-col-r">${right}</div>
      </div>`;
  }
  if (t === 'executive') {
    return `
      <div class="r-hd">
        ${photoBlock('width:78px;height:78px;border-radius:4px;')}
        <div>
          <div class="r-name" contenteditable="true">${s.name}</div>
          <div class="r-jobtitle" contenteditable="true">${s.jobTitle}</div>
          <div class="r-contact">${contacts}</div>
        </div>
      </div>
      <div class="r-body">${renderSections()}</div>`;
  }
  if (t === 'compact') {
    const leftIDs = ['summary','experience','education','projects'];
    const rightIDs = ['skills','certifications','achievements','languages','interests'];
    const left  = renderSections(sec => leftIDs.includes(sec.id));
    const right = renderSections(sec => rightIDs.includes(sec.id));
    return `
      <div class="r-hd">
        <div class="r-hd-left">
          <div class="r-name" contenteditable="true">${s.name}</div>
          <div class="r-jobtitle" contenteditable="true">${s.jobTitle}</div>
        </div>
        ${showPhoto ? `<div class="r-hd-right">${photoBlock('width:66px;height:66px;border-radius:50%;')}</div>` : ''}
      </div>
      <div class="r-hd-contact r-contact">${contacts}</div>
      <div class="r-body">
        <div class="r-col-l">${left}</div>
        <div class="r-col-r">${right}</div>
      </div>`;
  }
  if (t === 'elegant') {
    const leftIDs = ['skills','languages','certifications','interests'];
    const left  = renderSections(sec => leftIDs.includes(sec.id));
    const right = renderSections(sec => !leftIDs.includes(sec.id));
    return `
      <div class="r-hd">
        <div class="r-hd-main">
          <div class="r-name" contenteditable="true">${s.name}</div>
          <div class="r-jobtitle" contenteditable="true">${s.jobTitle}</div>
          <div class="r-contact">${contacts}</div>
        </div>
        ${showPhoto ? `<div class="r-hd-photo">${photoBlock('width:100px;height:100px;border-radius:50%;')}</div>` : ''}
      </div>
      <div class="r-body">
        <div class="r-col-l">${left}</div>
        <div class="r-col-r">${right}</div>
      </div>`;
  }
  if (t === 'tech') {
    const leftIDs = ['skills','languages','certifications','interests'];
    const left  = renderSections(sec => leftIDs.includes(sec.id));
    const right = renderSections(sec => !leftIDs.includes(sec.id));
    return `
      <div class="r-hd">
        ${photoBlock('width:76px;height:76px;border-radius:6px;')}
        <div>
          <div class="r-name" contenteditable="true">${s.name}</div>
          <div class="r-jobtitle" contenteditable="true">${s.jobTitle}</div>
          <div class="r-contact">${contacts}</div>
        </div>
      </div>
      <div class="r-body">
        <div class="r-col-l">${left}</div>
        <div class="r-col-r">${right}</div>
      </div>`;
  }
  if (t === 'infographic') {
    const leftIDs = ['skills','languages','certifications','interests'];
    const left  = renderSections(sec => leftIDs.includes(sec.id));
    const right = renderSections(sec => !leftIDs.includes(sec.id));
    return `
      <div class="r-accent"></div>
      <div class="r-inner">
        <div class="r-hd">
          ${photoBlock('width:84px;height:84px;border-radius:50%;')}
          <div>
            <div class="r-name" contenteditable="true">${s.name}</div>
            <div class="r-jobtitle" contenteditable="true">${s.jobTitle}</div>
            <div class="r-contact">${contacts}</div>
          </div>
        </div>
        <div class="r-body">
          <div class="r-col-l">${left}</div>
          <div class="r-col-r">${right}</div>
        </div>
      </div>`;
  }
  if (t === 'minimalist') {
    return `
      <div class="r-hd">
        ${photoBlock('width:70px;height:70px;border-radius:50%;')}
        <div>
          <div class="r-name" contenteditable="true">${s.name}</div>
          <div class="r-jobtitle" contenteditable="true">${s.jobTitle}</div>
          <div class="r-contact">${contacts}</div>
        </div>
      </div>
      <div class="r-body">${renderSections()}</div>`;
  }
  if (t === 'bold') {
    const leftIDs = ['skills','languages','certifications','interests'];
    const left  = renderSections(sec => leftIDs.includes(sec.id));
    const right = renderSections(sec => !leftIDs.includes(sec.id));
    return `
      <div class="r-hd">
        ${photoBlock('width:100px;height:100px;border-radius:8px;')}
        <div>
          <div class="r-name" contenteditable="true">${s.name}</div>
          <div class="r-jobtitle" contenteditable="true">${s.jobTitle}</div>
          <div class="r-contact">${contacts}</div>
        </div>
      </div>
      <div class="r-body">
        <div class="r-col-l">${left}</div>
        <div class="r-col-r">${right}</div>
      </div>`;
  }
  if (t === 'white') {
    return `
      <div class="r-hd">
        <div>
          <div class="r-name" contenteditable="true">${s.name}</div>
          <div class="r-jobtitle" contenteditable="true">${s.jobTitle}</div>
          <div class="r-contact">${contacts}</div>
        </div>
        ${photoBlock('width:74px;height:74px;border-radius:50%;border:1px solid #e2e8f0;')}
      </div>
      <div class="r-body">${renderSections()}</div>`;
  }
  if (t === 'ats') {
    return `
      <div class="r-hd">
        <div class="r-hd-main">
          <div class="r-name" contenteditable="true">${s.name}</div>
          <div class="r-jobtitle" contenteditable="true">${s.jobTitle}</div>
          <div class="r-contact">${contacts}</div>
        </div>
        ${photoBlock('width:68px;height:68px;border-radius:4px;border:1px solid #d1d5db;')}
      </div>
      <div class="r-body">${renderSections()}</div>`;
  }
  if (t === 'corporate') {
    const sideIDs = ['skills','languages','certifications'];
    const left  = renderSections(sec => sideIDs.includes(sec.id));
    const right = renderSections(sec => !sideIDs.includes(sec.id));
    return `
      <div class="r-hd">
        <div>
          <div class="r-name" contenteditable="true">${s.name}</div>
          <div class="r-jobtitle" contenteditable="true">${s.jobTitle}</div>
        </div>
        ${photoBlock('width:70px;height:70px;border-radius:8px;')}
      </div>
      <div class="r-corp-contact r-contact">${contacts}</div>
      <div class="r-body">
        <div class="r-col-l">${left}</div>
        <div class="r-col-r">${right}</div>
      </div>`;
  }
  if (t === 'timeline') {
    const leftIDs = ['summary','skills','languages','certifications'];
    const left  = renderSections(sec => leftIDs.includes(sec.id));
    const right = renderSections(sec => !leftIDs.includes(sec.id));
    return `
      <div class="r-hd">
        <div>
          <div class="r-name" contenteditable="true">${s.name}</div>
          <div class="r-jobtitle" contenteditable="true">${s.jobTitle}</div>
          <div class="r-contact">${contacts}</div>
        </div>
        ${photoBlock('width:74px;height:74px;border-radius:50%;border:2px solid #ddd6fe;')}
      </div>
      <div class="r-body">
        <div class="r-col-l">${left}</div>
        <div class="r-col-r r-timeline-col">${right}</div>
      </div>`;
  }
  if (t === 'academic') {
    return `
      <div class="r-hd">
        <div class="r-hd-main">
          <div class="r-name" contenteditable="true">${s.name}</div>
          <div class="r-jobtitle" contenteditable="true">${s.jobTitle}</div>
          <div class="r-contact">${contacts}</div>
        </div>
        ${photoBlock('width:66px;height:66px;border-radius:50%;border:1px solid #cbd5e1;')}
      </div>
      <div class="r-body">${renderSections()}</div>`;
  }
  if (t === 'federal') {
    return `
      <div class="r-hd">
        <div>
          <div class="r-name" contenteditable="true">${s.name}</div>
          <div class="r-jobtitle" contenteditable="true">${s.jobTitle}</div>
        </div>
        ${photoBlock('width:64px;height:64px;border-radius:4px;border:1px solid #bfdbfe;')}
      </div>
      <div class="r-fed-contact r-contact">${contacts}</div>
      <div class="r-body">${renderSections()}</div>`;
  }
  return '';
}

function secHTML(sec) {
  const s = S;
  let inner = '';
  switch(sec.id) {
    case 'summary':
      inner = `<div class="r-summary" contenteditable="true">${s.summary}</div>`;
      break;
    case 'skills':
      inner = `<div class="tag-cloud">${s.skills.map(sk=>`<span class="r-tag" contenteditable="true">${sk}</span>`).join('')}</div>
      <button class="add-btn" onclick="addItem('skills')">＋ Add Skill</button>`;
      break;
    case 'experience':
      inner = s.experience.map(e=>`
        <div class="r-item">
          <div class="r-item-hd">
            <div>
              <div class="r-item-title" contenteditable="true">${e.role}</div>
              <div class="r-item-sub" contenteditable="true">${e.company}</div>
              <div class="r-item-loc" contenteditable="true">${e.location}</div>
            </div>
            <div class="r-item-date" contenteditable="true">${e.date}</div>
          </div>
          <div class="r-item-desc" contenteditable="true">${e.desc}</div>
        </div>`).join('');
      inner += `<button class="add-btn" onclick="addItem('experience')">＋ Add Experience</button>`;
      break;
    case 'education':
      inner = s.education.map(e=>`
        <div class="r-item">
          <div class="r-item-hd">
            <div>
              <div class="r-item-title" contenteditable="true">${e.degree}</div>
              <div class="r-item-sub" contenteditable="true">${e.school}</div>
            </div>
            <div class="r-item-date" contenteditable="true">${e.date}</div>
          </div>
          <div class="r-item-desc" contenteditable="true">${e.desc}</div>
        </div>`).join('');
      inner += `<button class="add-btn" onclick="addItem('education')">＋ Add Education</button>`;
      break;
    case 'projects':
      inner = s.projects.map(p=>`
        <div class="r-item">
          <div class="r-item-hd">
            <div class="r-item-title" contenteditable="true">${p.name}</div>
            <div class="r-item-date" contenteditable="true">${p.tech}</div>
          </div>
          <div class="r-item-desc" contenteditable="true">${p.desc}</div>
        </div>`).join('');
      inner += `<button class="add-btn" onclick="addItem('projects')">＋ Add Project</button>`;
      break;
    case 'certifications':
      inner = s.certifications.map(c=>`<div class="simple-item" contenteditable="true">${c}</div>`).join('');
      inner += `<button class="add-btn" onclick="addItem('certifications')">＋ Add</button>`;
      break;
    case 'achievements':
      inner = s.achievements.map(a=>`<div class="simple-item" contenteditable="true">${a}</div>`).join('');
      inner += `<button class="add-btn" onclick="addItem('achievements')">＋ Add</button>`;
      break;
    case 'languages':
      inner = s.languages.map(l=>`
        <div class="lang-row">
          <span class="lang-name" contenteditable="true">${l.lang}</span>
          <span class="lang-lvl" contenteditable="true">${l.level}</span>
        </div>`).join('');
      inner += `<button class="add-btn" onclick="addItem('languages')">＋ Add Language</button>`;
      break;
    case 'interests':
      inner = `<div class="tag-cloud">${s.interests.map(i=>`<span class="r-tag" contenteditable="true">${i}</span>`).join('')}</div>`;
      inner += `<button class="add-btn" onclick="addItem('interests')">＋ Add</button>`;
      break;
  }
  const isNoPad = ['classic','minimal','executive','compact'].includes(S.template);
  const cls = `r-section`;
  const np = isNoPad ? 'style="padding:0!important;background:none!important;border:none!important;box-shadow:none!important;"' : '';

  // Build title HTML based on template style
  let titleHTML;
  if (['modern','professional','creative','tech'].includes(S.template)) {
    titleHTML = `<div class="sec-title">${sec.label}</div>`;
  } else if (S.template === 'executive') {
    titleHTML = `<div class="sec-title-wrap"><div class="sec-title">${sec.label}</div><div class="sec-title-rule"></div></div>`;
  } else if (S.template === 'infographic') {
    const icons = {summary:'💬',experience:'💼',education:'🎓',skills:'⚡',projects:'🚀',certifications:'📜',achievements:'🏆',languages:'🌐',interests:'✨'};
    titleHTML = `<div class="sec-title-wrap"><div class="sec-icon">${icons[sec.id]||'📌'}</div><div class="sec-title">${sec.label}</div></div>`;
  } else {
    titleHTML = `<div class="sec-title-line"><div class="sec-title">${sec.label}</div><hr></div>`;
  }

  return `<div class="${cls}" data-section="${sec.id}" data-visible="${sec.visible}" ${np}>
    ${titleHTML}${inner}
  </div>`;
}

/* ════════════════════════════════════════
   SECTION MANAGER
════════════════════════════════════════ */
function buildSecList() {
  const list = document.getElementById('sec-list');
  if (!list) {
    console.error('sec-list element not found');
    return;
  }
  if (!S || !S.sections) {
    console.error('State or sections not initialized');
    return;
  }
  list.innerHTML = S.sections.map((sec,i) => `
    <div class="sec-item" draggable="true" data-i="${i}"
      ondragstart="dstart(event,${i})" ondragover="dover(event)"
      ondrop="ddrop(event,${i})" ondragend="dend(event)">
      <span class="drag-handle">⠿</span>
      <span class="sec-name">${sec.label}</span>
      <button class="sec-vis ${sec.visible?'on':'off'}" onclick="toggleSec(${i})" title="${sec.visible?'Hide':'Show'}">
        ${sec.visible ? '👁' : '🚫'}
      </button>
    </div>
  `).join('');
}

let _di = null;
function dstart(e,i) { _di=i; e.currentTarget.classList.add('dragging'); }
function dover(e)    { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function ddrop(e,i)  {
  e.preventDefault();
  const [m] = S.sections.splice(_di,1);
  S.sections.splice(i,0,m);
  buildSecList(); render();
}
function dend(e) {
  document.querySelectorAll('.sec-item').forEach(el=>el.classList.remove('dragging','drag-over'));
  _di=null;
}
function toggleSec(i) {
  S.sections[i].visible = !S.sections[i].visible;
  buildSecList(); render();
}

/* ════════════════════════════════════════
   ADD ITEMS
════════════════════════════════════════ */
function addItem(key) {
  const map = {
    skills: () => S.skills.push('New Skill'),
    experience: () => S.experience.push({ role:'Job Title', company:'Company', location:'City', date:'2024 – Present', desc:'Describe your responsibilities.' }),
    education: () => S.education.push({ degree:'Degree', school:'Institution', date:'2020 – 2024', desc:'Additional details.' }),
    projects: () => S.projects.push({ name:'Project Name', tech:'Technologies', desc:'Brief description.' }),
    certifications: () => S.certifications.push('New Certification'),
    achievements: () => S.achievements.push('New Achievement'),
    languages: () => S.languages.push({ lang:'Language', level:'Level' }),
    interests: () => S.interests.push('New Interest')
  };
  if (map[key]) { map[key](); render(); notify('Item added','ok'); }
}

/* ════════════════════════════════════════
   PHOTO UPLOAD
════════════════════════════════════════ */
function setupPhotoClick() {
  document.querySelectorAll('.r-photo').forEach(w => {
    w.style.cursor = 'pointer';
    w.title = 'Click to upload photo';
    w.onclick = () => {
      const inp = document.createElement('input');
      inp.type = 'file'; inp.accept = 'image/*';
      inp.onchange = e => {
        const f = e.target.files[0]; if (!f) return;
        const r = new FileReader();
        r.onload = ev => { S.photo = ev.target.result; render(); };
        r.readAsDataURL(f);
      };
      inp.click();
    };
  });
}

/* ════════════════════════════════════════
   SCALE RESUME
════════════════════════════════════════ */
function scaleResume() {
  const area = document.getElementById('main-area');
  const wrap = document.getElementById('scale-wrap');
  const aw = area.clientWidth - 48;
  const rw = 794;
  const scale = Math.min(1, aw / rw);
  wrap.style.transform = `scale(${scale})`;
  wrap.style.width = `${rw}px`;
  wrap.style.marginBottom = `${(1123 * scale) - 1123 + 28}px`;
}
window.addEventListener('resize', scaleResume);

/* ════════════════════════════════════════
   STYLE CONTROLS
════════════════════════════════════════ */
const rv = d => document.getElementById('resume').style;
function sv(n,v)  { document.getElementById('resume').style.setProperty(n,v); }
function spx(n,v,l) { sv(n,v+'px'); if(l) document.getElementById(l).textContent=v+'px'; }
function spad(v) { sv('--r-padding', v+'px '+v+'px'); document.getElementById('lv-pad').textContent=v+'px'; }
function slh(v)  { const val=(v/10).toFixed(1); sv('--r-line-height',val); document.getElementById('lv-lh').textContent=val; }
function sem(n,v,l) { const em=(v/100).toFixed(2)+'em'; sv(n,em); if(l) document.getElementById(l).textContent=em; }
function tg(hd)  { hd.classList.toggle('open'); hd.nextElementSibling.classList.toggle('hidden'); }

/* ════════════════════════════════════════
   TABS
════════════════════════════════════════ */
function switchTab(panel,el) {
  document.querySelectorAll('.sidebar-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.sidebar-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-'+panel).classList.add('active');
}

/* ════════════════════════════════════════
   DARK MODE
════════════════════════════════════════ */
function toggleDark() {
  const on = document.body.getAttribute('data-dark')==='true';
  document.body.setAttribute('data-dark', !on);
  localStorage.setItem('rf_dark', !on);
}

/* ════════════════════════════════════════
   SAVE / LOAD
════════════════════════════════════════ */
function saveResume() {
  const filename = (S.name.replace(/\s+/g,'-') || 'Resume') + '.json';
  const dataStr = JSON.stringify(S, null, 2);
  const dataBlob = new Blob([dataStr], { type: 'application/json' });
  const url = URL.createObjectURL(dataBlob);
  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  link.click();
  URL.revokeObjectURL(url);
  localStorage.setItem('rf_state', JSON.stringify(S));
  notify('Resume saved to downloads! ✓','ok');
}
function loadResume() {
  try {
    const d = localStorage.getItem('rf_state');
    if (d) { 
      const loaded = JSON.parse(d);
      // Ensure sections array exists
      if (loaded && Array.isArray(loaded.sections)) {
        const defaultById = new Map(DEFAULT.sections.map(sec => [sec.id, sec]));
        loaded.sections = loaded.sections
          .filter(sec => defaultById.has(sec.id))
          .map(sec => ({ ...defaultById.get(sec.id), ...sec }));

        DEFAULT.sections.forEach(defSec => {
          if (!loaded.sections.some(sec => sec.id === defSec.id)) {
            loaded.sections.push({ ...defSec });
          }
        });

        S = loaded;
        console.log('Resume loaded from localStorage');
      } else {
        console.warn('Loaded state missing sections array, using defaults');
      }
    }
  } catch(e) {
    console.error('Error loading resume:', e);
  }
  if (localStorage.getItem('rf_dark')==='true') document.body.setAttribute('data-dark','true');
}
function clearStorage() {
  if (!confirm('Reset to default data?')) return;
  localStorage.removeItem('rf_state');
  S = JSON.parse(JSON.stringify(DEFAULT));
  init();
  notify('Reset to defaults','ok');
}

/* ════════════════════════════════════════
   EXPORT
════════════════════════════════════════ */
function printResume() {
  document.querySelectorAll('.add-btn, .remove-btn, .topbar-actions').forEach(b=>b.style.display='none');
  window.print();
  setTimeout(() => {
    document.querySelectorAll('.add-btn, .remove-btn, .topbar-actions').forEach(b=>b.style.display='');
    notify('Print dialog opened','ok');
  }, 500);
}

function downloadPDF() {
  const el = document.getElementById('resume');
  document.querySelectorAll('.add-btn').forEach(b=>b.style.display='none');
  showLoader(true);
  const opt = {
    margin: 0,
    filename: (S.name.replace(/\s+/g,'-') || 'Resume') + '.pdf',
    image: { type:'jpeg', quality:0.97 },
    html2canvas: { scale:2, useCORS:true, logging:false, scrollX:0, scrollY:0 },
    jsPDF: { unit:'px', format:[794,1123], orientation:'portrait' }
  };
  html2pdf().set(opt).from(el).save()
    .then(() => { showLoader(false); document.querySelectorAll('.add-btn').forEach(b=>b.style.display=''); notify('PDF downloaded!','ok'); })
    .catch(() => { showLoader(false); document.querySelectorAll('.add-btn').forEach(b=>b.style.display=''); notify('PDF failed — try Print instead','err'); });
}

function showLoader(on) { document.getElementById('loader').classList.toggle('on',on); }

/* ════════════════════════════════════════
   NOTIFY
════════════════════════════════════════ */
let _nt;
function notify(msg, type='ok') {
  const el = document.getElementById('notif');
  if (!el) {
    console.log('Notification:', msg);
    return;
  }
  el.textContent = msg;
  el.className = `notif ${type} show`;
  clearTimeout(_nt);
  _nt = setTimeout(() => el.classList.remove('show'), 2600);
}

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
function init() {
  console.log('Init called');
  console.log('State:', S);
  console.log('Sections:', S.sections);
  buildSecList();
  render();
  console.log('Init complete');
}

// Ensure DOM is loaded before initializing
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => {
    console.log('DOM loaded via event listener');
    loadResume();
    init();
  });
} else {
  console.log('DOM already loaded');
  loadResume();
  init();
}
</script>
